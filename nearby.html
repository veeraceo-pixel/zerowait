<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Nearby Services – ZeroWait</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
}

header {
  height: 70px;
  background: #ffffff;
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 0 20px;
  box-shadow: 0 1px 6px rgba(0,0,0,0.1);
}

header button {
  padding: 8px 14px;
  border: none;
  border-radius: 6px;
  cursor: pointer;
}

.home {
  background: #2563eb;
  color: white;
}

.back {
  background: #e5e7eb;
}

.page {
  display: flex;
  height: calc(100vh - 70px);
}

#map {
  flex: 1;
}

#list {
  flex: 1;
  overflow-y: auto;
  padding: 15px;
  background: #f5f7fb;
}

.card {
  background: white;
  padding: 15px;
  border-radius: 10px;
  margin-bottom: 15px;
  box-shadow: 0 3px 10px rgba(0,0,0,0.08);
}
</style>
</head>

<body>

<header>
  <button class="home" onclick="location.href='index.html'">Home</button>
  <button class="back" onclick="history.back()">Back</button>
  <strong>ZeroWait</strong>
</header>

<div class="page">
  <div id="map"></div>
  <div id="list"></div>
</div>

<script>
let map;
let service;

// SAFE fallback location (Bangalore)
const fallbackLocation = { lat: 12.9716, lng: 77.5946 };

const storedLocation = localStorage.getItem("userLocation");
const locationData = storedLocation ? JSON.parse(storedLocation) : fallbackLocation;

const serviceType = localStorage.getItem("serviceType") || "salon";

function initMap() {
  map = new google.maps.Map(document.getElementById("map"), {
    center: locationData,
    zoom: 14
  });

  service = new google.maps.places.PlacesService(map);

  const typeMap = {
    salon: "beauty_salon",
    restaurant: "restaurant",
    clinic: "doctor"
  };

  service.nearbySearch(
    {
      location: locationData,
      radius: 3000,
      type: typeMap[serviceType]
    },
    showResults
  );
}

function showResults(results, status) {
  if (status !== google.maps.places.PlacesServiceStatus.OK) {
    alert("Places API error: " + status);
    return;
  }

  const list = document.getElementById("list");
  list.innerHTML = "";

  results.forEach(place => {
    new google.maps.Marker({
      map,
      position: place.geometry.location,
      title: place.name
    });

    const wait = Math.floor(Math.random() * 30) + 10;

    const div = document.createElement("div");
    div.className = "card";
    div.innerHTML = `
      <strong>${place.name}</strong>
      <p>${place.vicinity || "Nearby"}</p>
      <p>⏱ Estimated wait: ${wait} mins (demo)</p>
    `;

    list.appendChild(div);
  });
}
</script>

<script async
  src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAG-Qv4aH4xE2VFAMImB_xwG4J8TmehUMQ&libraries=places&callback=initMap">
</script>

</body>
</html>
