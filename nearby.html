<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Nearby Services – ZeroWait</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f5f7fb;
}

header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 15px 40px;
  background: #fff;
  border-bottom: 1px solid #ddd;
}

.logo {
  font-size: 22px;
  font-weight: bold;
  color: #2563eb;
}

nav a {
  margin-left: 25px;
  text-decoration: none;
  color: #333;
  font-weight: 500;
}

.container {
  display: flex;
  height: calc(100vh - 70px);
}

#map {
  flex: 1;
}

.list {
  width: 420px;
  padding: 20px;
  overflow-y: auto;
  background: #f9fafb;
}

.card {
  background: white;
  padding: 16px;
  border-radius: 10px;
  margin-bottom: 15px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.06);
}

.badge {
  display: inline-block;
  background: #e5edff;
  color: #2563eb;
  padding: 4px 10px;
  border-radius: 20px;
  font-size: 13px;
  margin-top: 6px;
}

.btn {
  margin-top: 10px;
  background: #2563eb;
  color: white;
  border: none;
  padding: 8px 14px;
  border-radius: 6px;
  cursor: pointer;
}

h2 {
  margin-top: 0;
}
</style>
</head>

<body>

<header>
  <div class="logo">ZeroWait</div>
  <nav>
    <a href="index.html">Home</a>
    <a href="#">About Us</a>
    <a href="#">How It Works</a>
    <a href="#">Login</a>
  </nav>
</header>

<div class="container">
  <div id="map"></div>
  <div class="list" id="list"></div>
</div>

<script>
/* ---------- SAFE SERVICE TYPE HANDLING ---------- */
const params = new URLSearchParams(window.location.search);
let serviceType = params.get("type");

// persist type so refresh never breaks
if (serviceType) {
  localStorage.setItem("serviceType", serviceType);
} else {
  serviceType = localStorage.getItem("serviceType");
}

// final fallback
if (!serviceType) {
  serviceType = "salon";
}

/* ---------- DATA ---------- */
const DATA = {
  salon: [
    {
      name: "Vintage Nail & Beauty",
      distance: "2.1 km",
      wait: "23 min",
      level: "Medium"
    },
    {
      name: "Roop Beauty Salon",
      distance: "1.4 km",
      wait: "19 min",
      level: "Low"
    }
  ],
  restaurant: [
    {
      name: "Istanbul Grill Manchester",
      distance: "1.9 km",
      wait: "15 min",
      level: "Low"
    },
    {
      name: "My Lahore Manchester",
      distance: "2.5 km",
      wait: "28 min",
      level: "High"
    }
  ]
};

/* ---------- RENDER LIST ---------- */
const list = document.getElementById("list");

function renderList() {
  if (serviceType === "clinic") {
    list.innerHTML = "<h2>Clinics</h2><p>🚧 Coming soon</p>";
    document.getElementById("map").style.display = "none";
    return;
  }

  const items = DATA[serviceType];
  document.getElementById("map").style.display = "block";

  list.innerHTML = `<h2>Nearby ${serviceType === "salon" ? "Salons" : "Restaurants"}</h2>`;

  items.forEach(item => {
    list.innerHTML += `
      <div class="card">
        <strong>${item.name}</strong><br>
        📍 ${item.distance} away<br>
        ⏱ ${item.wait} wait<br>
        <span class="badge">${item.level}</span><br>
        <button class="btn" onclick="joinQueue('${item.name}')">Join Queue</button>
      </div>
    `;
  });
}

/* ---------- JOIN QUEUE (TESTABLE) ---------- */
function joinQueue(name) {
  alert("✅ Joined queue for: " + name);
}

/* ---------- MAP ---------- */
let map;

function initMap() {
  const manchester = { lat: 53.4808, lng: -2.2426 };

  map = new google.maps.Map(document.getElementById("map"), {
    center: manchester,
    zoom: 12
  });

  new google.maps.Marker({
    position: manchester,
    map,
    title: "You are here"
  });
}

/* ---------- INIT ---------- */
renderList();
</script>

<script
  src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAG-Qv4aH4xE2VFAMImB_xwG4J8TmehUMQ&callback=initMap"
  async defer>
</script>

</body>
</html>
