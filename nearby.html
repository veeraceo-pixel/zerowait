<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Nearby Services - ZeroWait</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <style>
        .split-view {
            display: flex;
            height: calc(100vh - 70px);
        }
        #map { flex: 1; }
        .list-panel {
            width: 400px;
            background: var(--bg-light);
            border-left: 1px solid var(--border);
            overflow-y: auto;
            padding: 1.5rem;
        }
        @media (max-width: 768px) {
            .split-view { flex-direction: column; height: auto; }
            .list-panel { width: 100%; border-left: none; border-top: 1px solid var(--border); }
            #map { height: 300px; flex: none; }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="container nav-content">
            <a href="index.html" class="logo">ZeroWait</a>
            <div class="nav-links">
                <a href="nearby.html" class="active">Nearby</a>
                <a href="about.html">About</a>
                <a href="how-it-works.html">How It Works</a>
                <a href="login.html" class="btn btn-outline">Login</a>
            </div>
        </div>
    </nav>

    <div class="split-view">
        <div id="map"></div>
        <div class="list-panel">
            <h2 id="title" class="h5 font-weight-bold mb-4">Nearby Services</h2>
            <div id="results">
                <p class="text-secondary small">Initializing map...</p>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script>
        const params = new URLSearchParams(window.location.search);
        let serviceType = params.get("type") || localStorage.getItem("serviceType") || 'salon';
        localStorage.setItem("serviceType", serviceType);
        
        const SERVICE_MAP = { salon: "beauty_salon", restaurant: "restaurant", clinic: "hospital" };
        const TITLE_MAP = { salon: "Nearby Salons", restaurant: "Nearby Restaurants", clinic: "Nearby Clinics" };
        document.getElementById("title").innerText = TITLE_MAP[serviceType] || "Nearby Services";

        let map, placesService, userLocation;

        function getUserLocation(cb) {
            navigator.geolocation.getCurrentPosition(
                pos => {
                    userLocation = { lat: pos.coords.latitude, lng: pos.coords.longitude };
                    localStorage.setItem("userLocation", JSON.stringify(userLocation));
                    cb();
                },
                () => { alert("Please allow location access to find nearby services."); },
                { enableHighAccuracy: true }
            );
        }

        function initMap() {
            getUserLocation(() => {
                map = new google.maps.Map(document.getElementById("map"), {
                    center: userLocation,
                    zoom: 14,
                    disableDefaultUI: true,
                    zoomControl: true,
                    styles: [{ "featureType": "poi", "stylers": [{ "visibility": "off" }] }]
                });

                new google.maps.Marker({
                    map,
                    position: userLocation,
                    icon: "https://maps.google.com/mapfiles/ms/icons/blue-dot.png",
                    title: "You are here"
                });

                if (serviceType === "clinic") {
                    document.getElementById("results").innerHTML = '<div class="card p-3" style="background: #fff7ed; color: #92400e;">Clinics support is coming soon 🚧</div>';
                    return;
                }

                placesService = new google.maps.places.PlacesService(map);
                searchNearby();
            });
        }

        function searchNearby() {
            placesService.nearbySearch({
                location: userLocation,
                radius: 3000,
                type: SERVICE_MAP[serviceType]
            }, renderResults);
        }

        function renderResults(results, status) {
            const container = document.getElementById("results");
            container.innerHTML = "";
            if (status !== google.maps.places.PlacesServiceStatus.OK || !results.length) {
                container.innerHTML = "<p>No nearby services found.</p>";
                return;
            }
            results.slice(0, 8).forEach(place => {
                new google.maps.Marker({ map, position: place.geometry.location, title: place.name });
                container.innerHTML += `
                    <div class="card p-3 mb-3 shadow-sm">
                        <strong class="d-block mb-1">${place.name}</strong>
                        <div class="small text-secondary mb-3">⭐ ${place.rating || "N/A"}</div>
                        <button class="btn btn-primary" style="width: 100%" onclick="goToQueue('${place.place_id}', '${encodeURIComponent(place.name)}')">Join Queue</button>
                    </div>
                `;
            });
        }

        function goToQueue(id, name) {
            window.location.href = `join-queue.html?provider=${id}&name=${name}`;
        }
    </script>
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAG-Qv4aH4xE2VFAMImB_xwG4J8TmehUMQ&libraries=places&callback=initMap" async defer></script>
</body>
</html>
