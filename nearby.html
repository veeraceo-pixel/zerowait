<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Nearby Services – ZeroWait</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f5f7fb;
}

header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 15px 40px;
  background: white;
  border-bottom: 1px solid #ddd;
}

.logo {
  font-size: 22px;
  font-weight: bold;
  color: #2563eb;
}

nav a {
  margin-left: 20px;
  text-decoration: none;
  color: #333;
}

.container {
  display: flex;
  height: calc(100vh - 70px);
}

#map {
  flex: 1;
}

.list {
  width: 420px;
  padding: 20px;
  overflow-y: auto;
}

.card {
  background: white;
  padding: 16px;
  border-radius: 10px;
  margin-bottom: 15px;
}

.badge {
  display: inline-block;
  background: #e5edff;
  color: #2563eb;
  padding: 4px 10px;
  border-radius: 20px;
  font-size: 13px;
}

.btn {
  margin-top: 10px;
  background: #2563eb;
  color: white;
  border: none;
  padding: 8px 14px;
  border-radius: 6px;
  cursor: pointer;
}

/* MODAL */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.4);
  display: none;
  justify-content: center;
  align-items: center;
}

.modal {
  background: white;
  padding: 20px;
  border-radius: 10px;
  width: 300px;
}

.modal input {
  width: 100%;
  padding: 8px;
  margin-bottom: 10px;
}
</style>
</head>

<body>

<header>
  <div class="logo">ZeroWait</div>
  <nav>
    <a href="index.html">Home</a>
  </nav>
</header>

<div class="container">
  <div id="map"></div>
  <div class="list" id="list"></div>
</div>

<!-- JOIN QUEUE MODAL -->
<div class="modal-overlay" id="queueModal">
  <div class="modal">
    <h3>Join Queue</h3>
    <input id="userName" placeholder="Your name">
    <input id="userPhone" placeholder="Phone number">
    <button class="btn" onclick="confirmJoin()">Confirm</button>
  </div>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const type = params.get("type");
const list = document.getElementById("list");

if (!type) {
  list.innerHTML = "<p>No service selected.</p>";
}

/* CLINIC = COMING SOON */
if (type === "clinic") {
  list.innerHTML = "<h3>Clinics coming soon 🚧</h3>";
  document.getElementById("map").style.display = "none";
}

/* DATA */
const SERVICE_KEY = `queue_${type}`;
const AVG_TIME = 15;

let selectedService = null;

function getQueue() {
  return JSON.parse(localStorage.getItem(SERVICE_KEY)) || [];
}

function saveQueue(queue) {
  localStorage.setItem(SERVICE_KEY, JSON.stringify(queue));
}

function renderList() {
  const queue = getQueue();
  const wait = queue.length * AVG_TIME;

  list.innerHTML = `
    <div class="card">
      <strong>${type.toUpperCase()} PLACE</strong><br>
      ⏱ Waiting Time: ${wait} mins<br>
      👥 People in queue: ${queue.length}<br>
      <span class="badge">${wait < 30 ? "Low" : "Medium"}</span><br>
      <button class="btn" onclick="openQueue()">Join Queue</button>
    </div>
  `;
}

function openQueue() {
  document.getElementById("queueModal").style.display = "flex";
}

function confirmJoin() {
  const name = document.getElementById("userName").value;
  const phone = document.getElementById("userPhone").value;

  if (!name || !phone) {
    alert("Enter details");
    return;
  }

  const queue = getQueue();
  queue.push({ name, phone, time: Date.now() });
  saveQueue(queue);

  document.getElementById("queueModal").style.display = "none";
  renderList();
}

if (type === "salon" || type === "restaurant") {
  renderList();
}

/* GOOGLE MAP */
function initMap() {
  if (type === "clinic") return;

  new google.maps.Map(document.getElementById("map"), {
    center: { lat: 12.9716, lng: 77.5946 },
    zoom: 13
  });
}
</script>

<script async
src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAG-Qv4aH4xE2VFAMImB_xwG4J8TmehUMQ&callback=initMap">
</script>

</body>
</html>
