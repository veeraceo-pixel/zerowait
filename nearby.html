<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Nearby Services – ZeroWait</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body { margin:0; font-family: Arial, sans-serif; }
header {
  height:70px;
  background:#fff;
  display:flex;
  align-items:center;
  gap:15px;
  padding:0 20px;
  box-shadow:0 1px 6px rgba(0,0,0,0.1);
}
header button {
  padding:8px 14px;
  border:none;
  border-radius:6px;
  cursor:pointer;
  background:#2563eb;
  color:white;
}
.page { display:flex; height:calc(100vh - 70px); }
#map { flex:1; }
#list { flex:1; padding:15px; overflow:auto; background:#f5f7fb; }
.card {
  background:white;
  padding:15px;
  border-radius:10px;
  margin-bottom:15px;
}
</style>
</head>

<body>

<header>
  <button onclick="location.href='index.html'">← Home</button>
  <strong>ZeroWait</strong>
</header>

<div class="page">
  <div id="map"></div>
  <div id="list"></div>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const serviceType = params.get("service") || "salon";

const fallback = { lat: 12.9716, lng: 77.5946 };

navigator.geolocation.getCurrentPosition(
  pos => startMap({ lat: pos.coords.latitude, lng: pos.coords.longitude }),
  () => startMap(fallback)
);

function startMap(location) {
  const map = new google.maps.Map(document.getElementById("map"), {
    center: location,
    zoom: 14
  });

  const service = new google.maps.places.PlacesService(map);

  const searchTypes = {
    salon: ["beauty_salon"],
    restaurant: ["restaurant"],
    clinic: ["hospital", "doctor", "pharmacy"]
  };

  searchTypes[serviceType].forEach(type => {
    service.nearbySearch(
      { location, radius: 3000, type },
      render
    );
  });

  function render(results, status) {
    if (status !== "OK") return;
    const list = document.getElementById("list");

    results.forEach(p => {
      new google.maps.Marker({ map, position: p.geometry.location });
      const wait = Math.floor(Math.random()*25)+10;
      list.innerHTML += `
        <div class="card">
          <strong>${p.name}</strong>
          <p>${p.vicinity || ""}</p>
          <p>⏱ ${wait} mins (demo)</p>
        </div>
      `;
    });
  }
}
</script>

<script async
  src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAG-Qv4aH4xE2VFAMImB_xwG4J8TmehUMQ&libraries=places">
</script>

</body>
</html>
