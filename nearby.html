<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Nearby Services – ZeroWait</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="style.css">

<style>
.page {
    display: flex;
    height: calc(100vh - 70px);
}
#map {
    flex: 1;
}
#list {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    background: #f9f9f9;
}
.place-card {
    background: white;
    padding: 15px;
    margin-bottom: 15px;
    border-radius: 10px;
    cursor: pointer;
}
.place-card:hover {
    border-left: 4px solid #ff5a5f;
}
</style>
</head>

<body>

<header class="navbar">
    <div class="logo">ZeroWait</div>
</header>

<div class="page">
    <div id="map"></div>
    <div id="list"></div>
</div>

<script>
const serviceType = localStorage.getItem("serviceType") || "salon";
const location = JSON.parse(localStorage.getItem("userLocation"));

let map;
let service;
let markers = [];

function initMap() {
    map = new google.maps.Map(document.getElementById("map"), {
        center: location,
        zoom: 14
    });

    service = new google.maps.places.PlacesService(map);

    service.nearbySearch(
        {
            location,
            radius: 3000,
            type: serviceType === "salon" ? "beauty_salon" : serviceType
        },
        renderResults
    );
}

function renderResults(results, status) {
    if (status !== google.maps.places.PlacesServiceStatus.OK) return;

    const list = document.getElementById("list");
    list.innerHTML = "";

    results.forEach(place => {
        const marker = new google.maps.Marker({
            map,
            position: place.geometry.location,
            title: place.name
        });

        markers.push(marker);

        const card = document.createElement("div");
        card.className = "place-card";
        card.innerHTML = `
            <h3>${place.name}</h3>
            <p>📍 ${place.vicinity || "Nearby"}</p>
        `;

        card.onclick = () => {
            map.panTo(place.geometry.location);
            map.setZoom(16);
        };

        list.appendChild(card);
    });
}
</script>

<script async
src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAPF8ukBKw8yPpWnuT8b_pAZAqFn63wq_E&libraries=places&callback=initMap">
</script>

</body>
</html>
