<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Nearby Services – ZeroWait</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="style.css">

<style>
.page {
    display: flex;
    height: calc(100vh - 70px);
}
#map {
    flex: 1;
}
#list {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    background: #f9f9f9;
}
.place-card {
    background: white;
    padding: 15px;
    margin-bottom: 15px;
    border-radius: 10px;
    cursor: pointer;
}
.place-card:hover {
    border-left: 4px solid #1a73e8;
}
</style>
</head>

<body>

<header class="navbar">
    <div class="logo">ZeroWait</div>
</header>

<div class="page">
    <div id="map"></div>
    <div id="list"></div>
</div>

<script>
const serviceType = localStorage.getItem("serviceType") || "salon";
const location = JSON.parse(localStorage.getItem("userLocation"));

if (!location) {
    alert("Location not found. Please go back and allow location access.");
    window.location.href = "index.html";
}

const serviceMap = {
    salon: "beauty_salon",
    restaurant: "restaurant",
    clinic: "doctor"
};

let map;
let service;

function initMap() {
    map = new google.maps.Map(document.getElementById("map"), {
        center: location,
        zoom: 14
    });

    // User marker
    new google.maps.Marker({
        position: location,
        map,
        title: "You are here",
        icon: {
            path: google.maps.SymbolPath.CIRCLE,
            scale: 8,
            fillColor: "#1a73e8",
            fillOpacity: 1,
            strokeWeight: 2
        }
    });

    service = new google.maps.places.PlacesService(map);

    service.nearbySearch(
        {
            location,
            radius: 3000,
            type: serviceMap[serviceType]
        },
        renderResults
    );
}

function renderResults(results, status) {
    if (status !== google.maps.places.PlacesServiceStatus.OK) {
        alert("No nearby services found.");
        return;
    }

    const list = document.getElementById("list");
    list.innerHTML = "";

    results.forEach(place => {
        const marker = new google.maps.Marker({
            map,
            position: place.geometry.location,
            title: place.name
        });

        const card = document.createElement("div");
        card.className = "place-card";
        card.innerHTML = `
            <h3>${place.name}</h3>
            <p>
              ⭐ ${place.rating || "N/A"}<br>
              📍 ${place.vicinity || "Nearby"}
            </p>
        `;

        card.onclick = () => {
            map.panTo(place.geometry.location);
            map.setZoom(16);
        };

        list.appendChild(card);
    });
}
</script>

<script async
src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAG-Qv4aH4xE2VFAMImB_xwG4J8TmehUMQ&libraries=places&callback=initMap">
</script>

</body>
</html>
