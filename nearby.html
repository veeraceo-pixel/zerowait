<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Nearby Services – ZeroWait</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f5f7fb;
}

header {
  background: #fff;
  padding: 14px 24px;
  display: flex;
  align-items: center;
  gap: 16px;
  box-shadow: 0 1px 4px rgba(0,0,0,0.1);
}

header h2 {
  margin: 0;
  color: #2563eb;
}

.home-btn {
  background: #2563eb;
  color: #fff;
  border: none;
  padding: 8px 14px;
  border-radius: 6px;
  cursor: pointer;
}

.page {
  display: flex;
  height: calc(100vh - 60px);
}

#map {
  flex: 1;
}

#list {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
}

.card {
  background: #fff;
  padding: 16px;
  border-radius: 12px;
  margin-bottom: 14px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.08);
}

.wait {
  display: inline-block;
  margin-top: 8px;
  padding: 4px 10px;
  border-radius: 12px;
  font-size: 12px;
  background: #fde68a;
}

.join {
  margin-top: 10px;
  background: #2563eb;
  color: #fff;
  border: none;
  padding: 8px 14px;
  border-radius: 6px;
  cursor: pointer;
}
</style>
</head>

<body>

<header>
  <button class="home-btn" onclick="goHome()">Home</button>
  <h2>ZeroWait</h2>
</header>

<div class="page">
  <div id="map"></div>
  <div id="list"></div>
</div>

<script>
let map;
let service;

function goHome() {
  window.location.href = "index.html";
}

// Get service type safely from URL
const params = new URLSearchParams(window.location.search);
const serviceType = params.get("type");

if (!serviceType) {
  alert("Service type missing. Redirecting home.");
  goHome();
}

// Convert to Google Places types
function getPlaceType(type) {
  if (type === "salon") return "beauty_salon";
  if (type === "restaurant") return "restaurant";
  return null;
}

// Generate fake wait time (demo purpose)
function getWaitTime() {
  const min = Math.floor(Math.random() * 30) + 10;
  return `${min} min`;
}

// Initialize map ONLY after location is ready
function initMapWithLocation(position) {
  const location = {
    lat: position.coords.latitude,
    lng: position.coords.longitude
  };

  map = new google.maps.Map(document.getElementById("map"), {
    center: location,
    zoom: 14
  });

  service = new google.maps.places.PlacesService(map);

  service.nearbySearch(
    {
      location,
      radius: 3000,
      type: getPlaceType(serviceType)
    },
    renderResults
  );
}

function renderResults(results, status) {
  if (status !== google.maps.places.PlacesServiceStatus.OK) {
    alert("No places found");
    return;
  }

  const list = document.getElementById("list");
  list.innerHTML = "";

  results.forEach(place => {
    new google.maps.Marker({
      map,
      position: place.geometry.location
    });

    const card = document.createElement("div");
    card.className = "card";
    card.innerHTML = `
      <h3>${place.name}</h3>
      <p>📍 ${place.vicinity || ""}</p>
      <span class="wait">⏱ ${getWaitTime()}</span><br/>
      <button class="join">Join Queue</button>
    `;

    list.appendChild(card);
  });
}

// Request location EVERY TIME (fixes blank page issue)
navigator.geolocation.getCurrentPosition(
  initMapWithLocation,
  () => alert("Location access required to show nearby services")
);
</script>

<script async
src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAG-Qv4aH4xE2VFAMImB_xwG4J8TmehUMQ&libraries=places">
</script>

</body>
</html>
