<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Nearby Services – ZeroWait</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f5f7fb;
}

header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 15px 40px;
  background: white;
  border-bottom: 1px solid #ddd;
}

.logo {
  font-size: 22px;
  font-weight: bold;
  color: #2563eb;
}

nav a {
  margin-left: 25px;
  text-decoration: none;
  color: #333;
}

.container {
  display: flex;
  height: calc(100vh - 70px);
}

#map {
  flex: 1;
}

.list {
  width: 420px;
  padding: 20px;
  overflow-y: auto;
}

.card {
  background: white;
  padding: 16px;
  border-radius: 10px;
  margin-bottom: 15px;
}

.badge {
  display: inline-block;
  background: #e5edff;
  color: #2563eb;
  padding: 4px 10px;
  border-radius: 20px;
  font-size: 13px;
}

.btn {
  margin-top: 10px;
  background: #2563eb;
  color: white;
  border: none;
  padding: 8px 14px;
  border-radius: 6px;
  cursor: pointer;
}
</style>
</head>

<body>

<header>
  <div class="logo">ZeroWait</div>
  <nav>
    <a href="index.html">Home</a>
    <a href="about.html">About Us</a>
    <a href="how-it-works.html">How It Works</a>
    <a href="login.html">Login</a>
  </nav>
</header>

<div class="container">
  <div id="map"></div>
  <div class="list" id="list"></div>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const type = params.get("type");
const list = document.getElementById("list");

if (!type) {
  list.innerHTML = "<h3>Please select a service from Home</h3>";
}

if (type === "clinic") {
  list.innerHTML = "<h3>Clinics coming soon 🚧</h3>";
  document.getElementById("map").style.display = "none";
}

if (type === "salon" || type === "restaurant") {
  document.title = `Nearby ${type === "salon" ? "Salons" : "Restaurants"} – ZeroWait`;

  list.innerHTML = `
    <div class="card">
      <strong>Vintage Nail & Beauty</strong><br>
      📍 2.1 km away<br>
      ⏱ 23 min wait
      <div class="badge">Medium</div><br>
      <button class="btn" onclick="alert('Queue joined (demo)')">Join Queue</button>
    </div>

    <div class="card">
      <strong>Roop Beauty Salon</strong><br>
      📍 1.4 km away<br>
      ⏱ 19 min wait
      <div class="badge">Low</div><br>
      <button class="btn" onclick="alert('Queue joined (demo)')">Join Queue</button>
    </div>
  `;
}
</script>

<script>
let map;

function initMap() {
  if (!type || type === "clinic") return;

  if (!navigator.geolocation) {
    alert("Geolocation not supported");
    return;
  }

  navigator.geolocation.getCurrentPosition(
    (position) => {
      const userLocation = {
        lat: position.coords.latitude,
        lng: position.coords.longitude
      };

      map = new google.maps.Map(document.getElementById("map"), {
        center: userLocation,
        zoom: 13
      });

      new google.maps.Marker({
        position: userLocation,
        map,
        title: "You are here",
        icon: {
          url: "https://maps.google.com/mapfiles/ms/icons/blue-dot.png"
        }
      });
    },
    () => {
      alert("Location permission denied");
    }
  );
}
</script>

<script
  src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAG-Qv4aH4xE2VFAMImB_xwG4J8TmehUMQ&callback=initMap"
  async defer>
</script>

</body>
</html>
