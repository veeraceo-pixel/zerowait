<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Nearby Services – ZeroWait</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f5f7fb;
}

header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 15px 40px;
  background: #fff;
  border-bottom: 1px solid #ddd;
}

.logo {
  font-size: 22px;
  font-weight: bold;
  color: #2563eb;
}

nav a {
  margin-left: 25px;
  text-decoration: none;
  color: #333;
}

.container {
  display: flex;
  height: calc(100vh - 70px);
}

#map {
  flex: 1;
}

.list {
  width: 420px;
  padding: 20px;
  overflow-y: auto;
}

h2 {
  margin-top: 0;
}

.card {
  background: white;
  padding: 16px;
  border-radius: 10px;
  margin-bottom: 15px;
}

.badge {
  display: inline-block;
  background: #e5edff;
  color: #2563eb;
  padding: 4px 10px;
  border-radius: 20px;
  font-size: 13px;
}

.btn {
  margin-top: 10px;
  background: #2563eb;
  color: white;
  border: none;
  padding: 8px 14px;
  border-radius: 6px;
  cursor: pointer;
}
</style>
</head>

<body>

<header>
  <div class="logo">ZeroWait</div>
  <nav>
    <a href="index.html">Home</a>
    <a href="about.html">About Us</a>
    <a href="how-it-works.html">How It Works</a>
    <a href="login.html">Login</a>
  </nav>
</header>

<div class="container">
  <div id="map"></div>
  <div class="list">
    <h2 id="title">Nearby Services</h2>
    <div id="results"></div>
  </div>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const type = params.get("type");

if (!type) {
  alert("Service type missing. Redirecting to home.");
  window.location.href = "index.html";
}

const serviceMap = {
  salon: "beauty_salon",
  restaurant: "restaurant",
  clinic: "hospital"
};

const titleMap = {
  salon: "Nearby Salons",
  restaurant: "Nearby Restaurants",
  clinic: "Nearby Clinics"
};

document.getElementById("title").innerText = titleMap[type];

let map, service, userLocation;

function initMap() {
  navigator.geolocation.getCurrentPosition(
    position => {
      userLocation = {
        lat: position.coords.latitude,
        lng: position.coords.longitude
      };

      map = new google.maps.Map(document.getElementById("map"), {
        center: userLocation,
        zoom: 14
      });

      new google.maps.Marker({
        position: userLocation,
        map,
        icon: "https://maps.google.com/mapfiles/ms/icons/blue-dot.png",
        title: "You are here"
      });

      service = new google.maps.places.PlacesService(map);
      searchPlaces();
    },
    () => {
      alert("Location access denied. Please allow location.");
    }
  );
}

function searchPlaces() {
  service.nearbySearch(
    {
      location: userLocation,
      radius: 3000,
      type: serviceMap[type]
    },
    renderResults
  );
}

function renderResults(results, status) {
  const container = document.getElementById("results");
  container.innerHTML = "";

  if (status !== google.maps.places.PlacesServiceStatus.OK || !results.length) {
    container.innerHTML = "<p>No results found.</p>";
    return;
  }

  results.slice(0, 8).forEach(place => {
    const marker = new google.maps.Marker({
      map,
      position: place.geometry.location
    });

    const distanceKm = getDistance(
      userLocation.lat,
      userLocation.lng,
      place.geometry.location.lat(),
      place.geometry.location.lng()
    ).toFixed(1);

    container.innerHTML += `
      <div class="card">
        <strong>${place.name}</strong><br>
        📍 ${distanceKm} km away<br>
        ⭐ Rating: ${place.rating || "N/A"}<br>
        <span class="badge">${place.opening_hours?.open_now ? "Open" : "Closed"}</span><br>
        <button class="btn" onclick="joinQueue('${place.name}')">Join Queue</button>
      </div>
    `;
  });
}

function joinQueue(name) {
  alert("Joined queue for " + name + " (demo)");
}

// Distance formula
function getDistance(lat1, lon1, lat2, lon2) {
  const R = 6371;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLon = (lon2 - lon1) * Math.PI / 180;
  const a =
    Math.sin(dLat / 2) * Math.sin(dLat / 2) +
    Math.cos(lat1 * Math.PI / 180) *
    Math.cos(lat2 * Math.PI / 180) *
    Math.sin(dLon / 2) * Math.sin(dLon / 2);
  return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a)));
}
</script>

<script
  src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAG-Qv4aH4xE2VFAMImB_xwG4J8TmehUMQ&libraries=places&callback=initMap"
  async defer></script>

</body>
</html>
