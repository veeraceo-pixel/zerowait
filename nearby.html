<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Nearby Services – ZeroWait</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f5f7fb;
}

header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 15px 40px;
  background: white;
  border-bottom: 1px solid #ddd;
}

.logo {
  font-size: 22px;
  font-weight: bold;
  color: #2563eb;
}

nav a {
  margin-left: 25px;
  text-decoration: none;
  color: #333;
  font-weight: 500;
}

.container {
  display: flex;
  height: calc(100vh - 70px);
}

#map {
  flex: 1;
}

.list {
  width: 420px;
  padding: 20px;
  overflow-y: auto;
}

.card {
  background: white;
  padding: 16px;
  border-radius: 10px;
  margin-bottom: 15px;
}

.badge {
  display: inline-block;
  background: #e5edff;
  color: #2563eb;
  padding: 4px 10px;
  border-radius: 20px;
  font-size: 13px;
  margin-left: 6px;
}

.btn {
  margin-top: 10px;
  background: #2563eb;
  color: white;
  border: none;
  padding: 8px 14px;
  border-radius: 6px;
  cursor: pointer;
}

.center {
  text-align: center;
  margin-top: 50px;
  color: #555;
}
</style>
</head>

<body>

<header>
  <div class="logo">ZeroWait</div>
  <nav>
    <a href="index.html">Home</a>
    <a href="#">About Us</a>
    <a href="#">How It Works</a>
    <a href="#">Login</a>
  </nav>
</header>

<div class="container">
  <div id="map"></div>
  <div class="list" id="list"></div>
</div>

<script>
/* ------------------------------
   SAFE SERVICE TYPE HANDLING
--------------------------------*/
const params = new URLSearchParams(window.location.search);
const serviceType = params.get("type") || "salon";

const GOOGLE_TYPE_MAP = {
  salon: ["beauty_salon", "hair_care"],
  restaurant: ["restaurant"]
};

const list = document.getElementById("list");

/* ------------------------------
   CLINIC → COMING SOON
--------------------------------*/
if (serviceType === "clinic") {
  document.getElementById("map").style.display = "none";
  list.innerHTML = `
    <div class="center">
      <h2>Clinics</h2>
      <p>Coming soon 🚧</p>
    </div>
  `;
}

/* ------------------------------
   MAP + PLACES
--------------------------------*/
let map;
let placesService;

function initMap() {
  if (serviceType === "clinic") return;

  getUserLocation().then(location => {
    map = new google.maps.Map(document.getElementById("map"), {
      center: location,
      zoom: 13
    });

    new google.maps.Marker({
      position: location,
      map,
      title: "You are here"
    });

    placesService = new google.maps.places.PlacesService(map);
    searchPlaces(location);
  });
}

/* ------------------------------
   USER LOCATION (SAFE)
--------------------------------*/
function getUserLocation() {
  return new Promise(resolve => {
    if (navigator.geolocation) {
      navigator.geolocation.getCurrentPosition(
        pos => resolve({ lat: pos.coords.latitude, lng: pos.coords.longitude }),
        () => resolve({ lat: 53.4808, lng: -2.2426 }) // Manchester fallback
      );
    } else {
      resolve({ lat: 53.4808, lng: -2.2426 });
    }
  });
}

/* ------------------------------
   SEARCH PLACES
--------------------------------*/
function searchPlaces(location) {
  list.innerHTML = "";

  const types = GOOGLE_TYPE_MAP[serviceType];

  types.forEach(type => {
    placesService.nearbySearch(
      {
        location,
        radius: 5000,
        type
      },
      renderResults
    );
  });
}

/* ------------------------------
   RENDER RESULTS
--------------------------------*/
function renderResults(results, status) {
  if (status !== google.maps.places.PlacesServiceStatus.OK) return;

  results.slice(0, 5).forEach(place => {
    new google.maps.Marker({
      map,
      position: place.geometry.location
    });

    const wait = Math.floor(Math.random() * 30) + 5;
    const level = wait < 15 ? "Low" : wait < 25 ? "Medium" : "High";

    const card = document.createElement("div");
    card.className = "card";
    card.innerHTML = `
      <strong>${place.name}</strong><br>
      📍 ${place.vicinity || "Nearby"}<br>
      ⏱ ${wait} min wait
      <span class="badge">${level}</span><br>
      <button class="btn" onclick="joinQueue('${place.place_id}')">Join Queue</button>
    `;

    list.appendChild(card);
  });
}

/* ------------------------------
   JOIN QUEUE (DEMO)
--------------------------------*/
function joinQueue(placeId) {
  alert("Joined queue successfully!\n(Backend integration next)");
}
</script>

<script
  src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAG-Qv4aH4xE2VFAMImB_xwG4J8TmehUMQ&libraries=places&callback=initMap"
  async defer>
</script>

</body>
</html>
