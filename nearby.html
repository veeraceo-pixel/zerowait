<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Nearby Services – ZeroWait</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f5f7fb;
}

header {
  height: 64px;
  background: #ffffff;
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 0 20px;
  box-shadow: 0 1px 6px rgba(0,0,0,0.1);
}

header h2 {
  margin: 0;
  color: #2563eb;
}

.home-btn {
  background: #2563eb;
  color: white;
  border: none;
  padding: 8px 14px;
  border-radius: 6px;
  cursor: pointer;
}

.page {
  display: flex;
  height: calc(100vh - 64px);
}

#map {
  flex: 1;
}

#list {
  flex: 1;
  overflow-y: auto;
  padding: 16px;
}

.card {
  background: #ffffff;
  padding: 16px;
  border-radius: 12px;
  margin-bottom: 14px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.08);
}

.wait {
  display: inline-block;
  margin-top: 6px;
  padding: 4px 10px;
  border-radius: 12px;
  font-size: 12px;
  background: #fde68a;
}

.join {
  margin-top: 10px;
  background: #2563eb;
  color: #fff;
  border: none;
  padding: 8px 14px;
  border-radius: 6px;
  cursor: pointer;
}
</style>
</head>

<body>

<header>
  <button class="home-btn" onclick="location.href='index.html'">← Home</button>
  <h2>ZeroWait</h2>
</header>

<div class="page">
  <div id="map"></div>
  <div id="list"></div>
</div>

<script>
/* ========= GLOBAL STATE ========= */
let map;
let placesService;

/* ========= READ SERVICE TYPE ========= */
const params = new URLSearchParams(window.location.search);
const serviceType = params.get("type");

if (!serviceType) {
  alert("Missing service type. Redirecting to home.");
  window.location.href = "index.html";
}

/* ========= TYPE MAPPING ========= */
function getGoogleType(type) {
  if (type === "salon") return "beauty_salon";
  if (type === "restaurant") return "restaurant";
  return null;
}

/* ========= DEMO WAIT TIME ========= */
function getWaitTime() {
  return Math.floor(Math.random() * 25) + 10 + " mins";
}

/* ========= GOOGLE MAP CALLBACK ========= */
function initMap() {
  if (!navigator.geolocation) {
    alert("Geolocation not supported");
    return;
  }

  navigator.geolocation.getCurrentPosition(
    position => {
      const userLocation = {
        lat: position.coords.latitude,
        lng: position.coords.longitude
      };

      map = new google.maps.Map(document.getElementById("map"), {
        center: userLocation,
        zoom: 14
      });

      placesService = new google.maps.places.PlacesService(map);

      placesService.nearbySearch(
        {
          location: userLocation,
          radius: 3000,
          type: getGoogleType(serviceType)
        },
        renderResults
      );
    },
    () => alert("Please allow location access")
  );
}

/* ========= RENDER RESULTS ========= */
function renderResults(results, status) {
  if (status !== google.maps.places.PlacesServiceStatus.OK) {
    alert("No places found");
    return;
  }

  const list = document.getElementById("list");
  list.innerHTML = "";

  results.forEach(place => {
    new google.maps.Marker({
      map,
      position: place.geometry.location
    });

    const card = document.createElement("div");
    card.className = "card";
    card.innerHTML = `
      <h3>${place.name}</h3>
      <p>📍 ${place.vicinity || ""}</p>
      <span class="wait">⏱ ${getWaitTime()}</span><br/>
      <button class="join">Join Queue</button>
    `;

    list.appendChild(card);
  });
}
</script>

<!-- ✅ CRITICAL: callback=initMap -->
<script async
  src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAG-Qv4aH4xE2VFAMImB_xwG4J8TmehUMQ&libraries=places&callback=initMap">
</script>

</body>
</html>
