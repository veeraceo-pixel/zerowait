<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Nearby Services – ZeroWait</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f5f7fb;
}

.header {
  display: flex;
  align-items: center;
  padding: 15px 20px;
  background: white;
  border-bottom: 1px solid #ddd;
}

.home-btn {
  background: #2563eb;
  color: white;
  border: none;
  padding: 8px 16px;
  border-radius: 6px;
  cursor: pointer;
  margin-right: 15px;
}

.container {
  display: flex;
  height: calc(100vh - 60px);
}

#map {
  flex: 1;
}

.list {
  width: 420px;
  padding: 20px;
  overflow-y: auto;
}

.card {
  background: white;
  padding: 16px;
  border-radius: 10px;
  margin-bottom: 15px;
}

.center {
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100%;
  font-size: 20px;
  color: #666;
}
</style>
</head>

<body>

<div class="header">
  <button class="home-btn" onclick="goHome()">Home</button>
  <h2 id="title">Nearby Services</h2>
</div>

<div class="container">
  <div id="map"></div>
  <div class="list" id="list"></div>
</div>

<script>
function goHome() {
  window.location.href = "index.html";
}

const type = new URLSearchParams(window.location.search).get("type");
const list = document.getElementById("list");
const title = document.getElementById("title");

if (!type) {
  list.innerHTML = "<div class='center'>No service selected</div>";
  document.getElementById("map").style.display = "none";
}
else if (type === "clinic") {
  title.innerText = "Clinics – Coming Soon";
  list.innerHTML = "<div class='center'>Clinics feature coming soon 🚧</div>";
  document.getElementById("map").style.display = "none";
}
else {
  title.innerText = type === "salon" ? "Nearby Salons" : "Nearby Restaurants";

  list.innerHTML = `
    <div class="card"><strong>${type === "salon" ? "Vintage Nail & Beauty" : "Urban Eats"}</strong><br>⏱ 23 min</div>
    <div class="card"><strong>${type === "salon" ? "Roop Beauty Salon" : "Spice Kitchen"}</strong><br>⏱ 18 min</div>
  `;
}
</script>

<script
  src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAG-Qv4aH4xE2VFAMImB_xwG4J8TmehUMQ&callback=initMap"
  async defer></script>

<script>
function initMap() {
  if (!type || type === "clinic") return;

  new google.maps.Map(document.getElementById("map"), {
    center: { lat: 53.4808, lng: -2.2426 },
    zoom: 13
  });
}
</script>

</body>
</html>
