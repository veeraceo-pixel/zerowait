<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Nearby Services – ZeroWait</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f5f7fb;
  }

  /* HEADER */
  .navbar {
    height: 70px;
    background: white;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 30px;
    box-shadow: 0 1px 6px rgba(0,0,0,0.08);
    z-index: 10;
  }

  .logo {
    font-size: 22px;
    font-weight: bold;
    color: #2563eb;
    cursor: pointer;
  }

  .nav-actions button {
    margin-left: 10px;
    padding: 8px 14px;
    border-radius: 6px;
    border: none;
    font-weight: 600;
    cursor: pointer;
  }

  .home-btn {
    background: #2563eb;
    color: white;
  }

  .back-btn {
    background: #e5e7eb;
  }

  /* LAYOUT */
  .page {
    display: flex;
    height: calc(100vh - 70px);
  }

  #map {
    flex: 1;
  }

  #list {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
  }

  /* CARDS */
  .place-card {
    background: white;
    padding: 20px;
    margin-bottom: 20px;
    border-radius: 14px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.05);
  }

  .place-card h3 {
    margin: 0 0 5px;
  }

  .wait {
    margin-top: 10px;
    display: inline-block;
    padding: 6px 12px;
    border-radius: 20px;
    font-size: 14px;
    font-weight: 600;
    background: #e0f2fe;
    color: #0369a1;
  }

  .join-btn {
    margin-top: 12px;
    display: inline-block;
    padding: 10px 16px;
    background: #2563eb;
    color: white;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    font-weight: 600;
  }
</style>
</head>

<body>

<!-- HEADER -->
<header class="navbar">
  <div class="logo" onclick="goHome()">ZeroWait</div>
  <div class="nav-actions">
    <button class="back-btn" onclick="goBack()">← Back</button>
    <button class="home-btn" onclick="goHome()">Home</button>
  </div>
</header>

<!-- CONTENT -->
<div class="page">
  <div id="map"></div>
  <div id="list"></div>
</div>

<script>
const serviceType = localStorage.getItem("serviceType") || "salon";
const location = JSON.parse(localStorage.getItem("userLocation"));

let map;
let service;

function goHome() {
  window.location.href = "index.html";
}

function goBack() {
  window.history.back();
}

function initMap() {
  map = new google.maps.Map(document.getElementById("map"), {
    center: location,
    zoom: 14
  });

  service = new google.maps.places.PlacesService(map);

  service.nearbySearch(
    {
      location,
      radius: 3000,
      type: serviceType === "salon" ? "beauty_salon" : serviceType
    },
    renderResults
  );
}

function renderResults(results, status) {
  if (status !== google.maps.places.PlacesServiceStatus.OK) return;

  const list = document.getElementById("list");
  list.innerHTML = "";

  results.forEach(place => {
    new google.maps.Marker({
      map,
      position: place.geometry.location,
      title: place.name
    });

    // ⛔ DUMMY WAIT TIME (for now)
    const waitTime = Math.floor(Math.random() * 30) + 10;

    const card = document.createElement("div");
    card.className = "place-card";
    card.innerHTML = `
      <h3>${place.name}</h3>
      <p>📍 ${place.vicinity || "Nearby"}</p>
      <div class="wait">⏱ ${waitTime} min (estimated)</div><br>
      <button class="join-btn">Join Queue</button>
    `;

    list.appendChild(card);
  });
}
</script>

<script async
  src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAG-Qv4aH4xE2VFAMImB_xwG4J8TmehUMQ&libraries=places&callback=initMap">
</script>

</body>
</html>
