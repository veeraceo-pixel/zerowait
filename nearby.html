<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Nearby Services – ZeroWait</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f5f7fb;
}

/* HEADER */
.header {
  display: flex;
  align-items: center;
  padding: 15px 20px;
  background: white;
  border-bottom: 1px solid #ddd;
}

.home-btn {
  background: #2563eb;
  color: white;
  border: none;
  padding: 8px 16px;
  border-radius: 6px;
  cursor: pointer;
  margin-right: 15px;
}

.title {
  font-size: 20px;
  font-weight: bold;
}

/* LAYOUT */
.container {
  display: flex;
  height: calc(100vh - 60px);
}

#map {
  flex: 1;
}

.list {
  width: 420px;
  background: #f7f9fc;
  overflow-y: auto;
  padding: 20px;
}

.card {
  background: white;
  padding: 16px;
  border-radius: 10px;
  margin-bottom: 15px;
}

.wait {
  margin-top: 10px;
  font-size: 14px;
}

.join {
  margin-top: 12px;
  background: #2563eb;
  color: white;
  border: none;
  padding: 8px 14px;
  border-radius: 6px;
  cursor: pointer;
}

.center {
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100%;
  font-size: 20px;
  color: #666;
}
</style>
</head>

<body>

<div class="header">
  <button class="home-btn" onclick="goHome()">Home</button>
  <div class="title" id="pageTitle">Nearby Services</div>
</div>

<div class="container">
  <div id="map"></div>
  <div class="list" id="serviceList"></div>
</div>

<script>
function goHome() {
  window.location.href = "index.html";
}

// ✅ READ SERVICE TYPE FROM URL
const params = new URLSearchParams(window.location.search);
const serviceType = params.get("type");

const title = document.getElementById("pageTitle");
const list = document.getElementById("serviceList");

// 🛑 SAFETY CHECK
if (!serviceType) {
  title.innerText = "No Service Selected";
  list.innerHTML = "<div class='center'>Please go back and select a service.</div>";
}

// 🚧 CLINIC COMING SOON
else if (serviceType === "clinic") {
  title.innerText = "Clinics – Coming Soon";
  list.innerHTML = "<div class='center'>Clinics feature coming soon 🚧</div>";
  document.getElementById("map").style.display = "none";
}

// ✅ SALON & RESTAURANT
else {
  title.innerText =
    serviceType === "salon" ? "Nearby Salons" : "Nearby Restaurants";

  list.innerHTML = `
    <div class="card">
      <strong>${serviceType === "salon" ? "Vintage Nail & Beauty" : "Urban Eats"}</strong>
      <div class="wait">⏱ 23 min · Medium wait</div>
      <button class="join">Join Queue</button>
    </div>

    <div class="card">
      <strong>${serviceType === "salon" ? "Roop Beauty Salon" : "Spice Kitchen"}</strong>
      <div class="wait">⏱ 19 min · Low wait</div>
      <button class="join">Join Queue</button>
    </div>
  `;
}
</script>

<!-- GOOGLE MAPS -->
<script
  src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAG-Qv4aH4xE2VFAMImB_xwG4J8TmehUMQ&callback=initMap"
  async defer>
</script>

<script>
function initMap() {
  if (serviceType === "clinic" || !serviceType) return;

  const map = new google.maps.Map(document.getElementById("map"), {
    center: { lat: 53.4808, lng: -2.2426 },
    zoom: 13,
  });

  new google.maps.Marker({
    position: { lat: 53.4808, lng: -2.2426 },
    map: map,
  });
}
</script>

</body>
</html>
