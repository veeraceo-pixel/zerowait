<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Nearby Services – ZeroWait</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f5f7fb;
}

header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 15px 40px;
  background: #fff;
  border-bottom: 1px solid #ddd;
}

.logo {
  font-size: 22px;
  font-weight: bold;
  color: #2563eb;
}

nav a {
  margin-left: 25px;
  text-decoration: none;
  color: #333;
}

.container {
  display: flex;
  height: calc(100vh - 70px);
}

#map {
  flex: 1;
}

.list {
  width: 420px;
  padding: 20px;
  overflow-y: auto;
}

.card {
  background: white;
  padding: 16px;
  border-radius: 10px;
  margin-bottom: 15px;
}

.badge {
  display: inline-block;
  background: #e5edff;
  color: #2563eb;
  padding: 4px 10px;
  border-radius: 20px;
  font-size: 13px;
}

.btn {
  margin-top: 10px;
  background: #2563eb;
  color: white;
  border: none;
  padding: 8px 14px;
  border-radius: 6px;
  cursor: pointer;
}
</style>
</head>

<body>

<header>
  <div class="logo">ZeroWait</div>
  <nav>
    <a href="index.html">Home</a>
  </nav>
</header>

<div class="container">
  <div id="map"></div>
  <div class="list">
    <h2 id="title">Nearby Services</h2>
    <div id="results">Loading...</div>
  </div>
</div>

<script>
/* ================================
   SAFE STATE HANDLING
================================ */

const params = new URLSearchParams(window.location.search);
let serviceType = params.get("type") || localStorage.getItem("serviceType");

if (!serviceType) {
  document.getElementById("results").innerHTML =
    "<p>Please select a service from Home page.</p>";
  throw new Error("Service type missing");
}

localStorage.setItem("serviceType", serviceType);

const SERVICE_MAP = {
  salon: "beauty_salon",
  restaurant: "restaurant",
  clinic: "hospital"
};

const TITLE_MAP = {
  salon: "Nearby Salons",
  restaurant: "Nearby Restaurants",
  clinic: "Nearby Clinics"
};

document.getElementById("title").innerText = TITLE_MAP[serviceType];

let map, placesService, userLocation;

/* ================================
   LOCATION (WITH CACHE)
================================ */

function getLocation(callback) {
  const cached = localStorage.getItem("userLocation");
  if (cached) {
    userLocation = JSON.parse(cached);
    callback();
    return;
  }

  navigator.geolocation.getCurrentPosition(
    pos => {
      userLocation = {
        lat: pos.coords.latitude,
        lng: pos.coords.longitude
      };
      localStorage.setItem("userLocation", JSON.stringify(userLocation));
      callback();
    },
    () => {
      alert("Location permission required");
    }
  );
}

/* ================================
   GOOGLE MAPS INIT
================================ */

function initMap() {
  getLocation(() => {
    map = new google.maps.Map(document.getElementById("map"), {
      center: userLocation,
      zoom: 14
    });

    new google.maps.Marker({
      map,
      position: userLocation,
      icon: "https://maps.google.com/mapfiles/ms/icons/blue-dot.png"
    });

    placesService = new google.maps.places.PlacesService(map);
    searchPlaces();
  });
}

/* ================================
   PLACES SEARCH
================================ */

function searchPlaces() {
  placesService.nearbySearch(
    {
      location: userLocation,
      radius: 3000,
      type: SERVICE_MAP[serviceType]
    },
    renderResults
  );
}

function renderResults(results, status) {
  const container = document.getElementById("results");
  container.innerHTML = "";

  if (
    status !== google.maps.places.PlacesServiceStatus.OK ||
    !results.length
  ) {
    container.innerHTML =
      "<p>No nearby services found. Try again later.</p>";
    return;
  }

  results.slice(0, 8).forEach(place => {
    new google.maps.Marker({
      map,
      position: place.geometry.location
    });

    container.innerHTML += `
      <div class="card">
        <strong>${place.name}</strong><br>
        ⭐ ${place.rating || "N/A"}<br>
        <span class="badge">
          ${place.opening_hours?.open_now ? "Open" : "Closed"}
        </span><br>
        <button class="btn" onclick="alert('Queue joined (demo)')">
          Join Queue
        </button>
      </div>
    `;
  });
}
</script>

<script
  src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAG-Qv4aH4xE2VFAMImB_xwG4J8TmehUMQ&libraries=places&callback=initMap"
  async defer></script>

</body>
</html>
