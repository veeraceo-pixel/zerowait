<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Nearby Services – ZeroWait</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<link rel="stylesheet" href="style.css" />

<style>
/* ---------- RESET ---------- */
* {
    box-sizing: border-box;
    font-family: Arial, Helvetica, sans-serif;
}

body {
    margin: 0;
    background: #f7f9fc;
    color: #222;
}

/* ---------- HEADER ---------- */
header {
    padding: 16px 30px;
    background: #ffffff;
    border-bottom: 1px solid #eee;
}

header .logo {
    font-size: 20px;
    font-weight: bold;
    color: #2563eb;
}

/* ---------- LAYOUT ---------- */
.page {
    display: flex;
    height: calc(100vh - 64px);
}

/* ---------- MAP ---------- */
#map {
    flex: 1;
}

/* ---------- LIST ---------- */
#list {
    flex: 1;
    padding: 20px;
    overflow-y: auto;
    background: #f9fafb;
}

.place-card {
    background: #ffffff;
    padding: 16px;
    border-radius: 14px;
    margin-bottom: 16px;
    box-shadow: 0 6px 18px rgba(0,0,0,0.06);
    transition: all 0.2s ease;
}

.place-card:hover {
    transform: translateY(-2px);
}

.place-card h3 {
    margin: 0 0 6px;
    font-size: 18px;
}

.place-meta {
    font-size: 14px;
    color: #555;
    margin-bottom: 10px;
}

.wait-badge {
    display: inline-block;
    padding: 4px 10px;
    border-radius: 999px;
    font-size: 13px;
    font-weight: bold;
    margin-right: 10px;
}

.wait-low {
    background: #dcfce7;
    color: #166534;
}

.wait-medium {
    background: #fef9c3;
    color: #854d0e;
}

.wait-high {
    background: #fee2e2;
    color: #991b1b;
}

.join-btn {
    background: #2563eb;
    color: #fff;
    border: none;
    padding: 10px 18px;
    border-radius: 10px;
    cursor: pointer;
    font-size: 14px;
}

.join-btn:hover {
    background: #1e4ed8;
}

/* ---------- MOBILE ---------- */
@media (max-width: 768px) {
    .page {
        flex-direction: column;
    }

    #map {
        height: 45vh;
    }

    #list {
        height: 55vh;
    }
}
</style>
</head>

<body>

<!-- HEADER -->
<header>
    <div class="logo">ZeroWait</div>
</header>

<!-- PAGE -->
<div class="page">
    <div id="map"></div>
    <div id="list">
        <p>Finding nearby services…</p>
    </div>
</div>

<!-- SCRIPT -->
<script>
/* ================================
   ZeroWait – Nearby Logic (FINAL)
================================ */

// Get data from homepage
const serviceType = localStorage.getItem("serviceType") || "all";
const userLocation = JSON.parse(localStorage.getItem("userLocation"));

// Safety check
if (!userLocation) {
    alert("Location not found. Please allow location access.");
    window.location.href = "index.html";
}

// Globals
let map;
let placesService;
let markers = [];

/* ---------- INIT MAP ---------- */
function initMap() {
    map = new google.maps.Map(document.getElementById("map"), {
        center: userLocation,
        zoom: 14
    });

    placesService = new google.maps.places.PlacesService(map);

    searchNearby();
}

/* ---------- SEARCH ---------- */
function searchNearby() {
    const request = {
        location: userLocation,
        radius: 3000,
        type: getPlaceType(serviceType)
    };

    placesService.nearbySearch(request, renderResults);
}

/* ---------- RENDER ---------- */
function renderResults(results, status) {
    const list = document.getElementById("list");
    list.innerHTML = "";

    if (status !== google.maps.places.PlacesServiceStatus.OK || !results.length) {
        list.innerHTML = "<p>No services found nearby.</p>";
        return;
    }

    results.forEach(place => {
        // Marker
        const marker = new google.maps.Marker({
            map,
            position: place.geometry.location,
            title: place.name
        });

        markers.push(marker);

        // Mock wait time
        const wait = Math.floor(Math.random() * 40) + 5;
        let waitClass = "wait-low";
        let waitLabel = "Low wait";

        if (wait > 30) {
            waitClass = "wait-high";
            waitLabel = "High wait";
        } else if (wait > 15) {
            waitClass = "wait-medium";
            waitLabel = "Medium wait";
        }

        // Card
        const card = document.createElement("div");
        card.className = "place-card";
        card.innerHTML = `
            <h3>${place.name}</h3>
            <div class="place-meta">📍 ${place.vicinity || "Nearby"}</div>
            <div class="place-meta">
                <span class="wait-badge ${waitClass}">
                    ⏱ ${wait} min
                </span>
                ${waitLabel}
            </div>
            <button class="join-btn">Join Queue</button>
        `;

        // Interactions
        card.querySelector(".join-btn").addEventListener("click", () => {
            alert("✅ You’ve joined the queue. You’ll be notified soon.");
        });

        card.addEventListener("click", () => {
            map.panTo(place.geometry.location);
            map.setZoom(16);
        });

        list.appendChild(card);
    });
}

/* ---------- TYPE MAP ---------- */
function getPlaceType(type) {
    switch (type) {
        case "salon":
            return "beauty_salon";
        case "restaurant":
            return "restaurant";
        case "clinic":
            return "doctor";
        default:
            return "establishment";
    }
}
</script>

<!-- GOOGLE MAPS -->
<script
  async
  defer
  src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAG-Qv4aH4xE2VFAMImB_xwG4J8TmehUMQ&libraries=places&callback=initMap">
</script>

</body>
</html>
