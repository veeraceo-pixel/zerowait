<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Nearby Services – ZeroWait</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f5f7fb;
}

header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 15px 40px;
  background: white;
  border-bottom: 1px solid #ddd;
}

.logo {
  font-size: 22px;
  font-weight: bold;
  color: #2563eb;
}

nav a {
  margin-left: 25px;
  text-decoration: none;
  color: #333;
}

.container {
  display: flex;
  height: calc(100vh - 70px);
}

#map {
  flex: 1;
}

.list {
  width: 420px;
  padding: 20px;
  overflow-y: auto;
}

.card {
  background: white;
  padding: 16px;
  border-radius: 10px;
  margin-bottom: 15px;
}

.badge {
  display: inline-block;
  background: #e5edff;
  color: #2563eb;
  padding: 4px 10px;
  border-radius: 20px;
  font-size: 13px;
  margin-top: 5px;
}

.btn {
  margin-top: 10px;
  background: #2563eb;
  color: white;
  border: none;
  padding: 8px 14px;
  border-radius: 6px;
}
</style>
</head>

<body>

<header>
  <div class="logo">ZeroWait</div>
  <nav>
    <a href="index.html">Home</a>
    <a href="#">About Us</a>
    <a href="#">How It Works</a>
    <a href="#">Login</a>
  </nav>
</header>

<div class="container">
  <div id="map"></div>
  <div class="list" id="list"></div>
</div>

<script>
const type = new URLSearchParams(window.location.search).get("type");
const list = document.getElementById("list");

if (!type) {
  list.innerHTML = "No service selected";
}

if (type === "clinic") {
  list.innerHTML = "<h3>Clinics coming soon 🚧</h3>";
  document.getElementById("map").style.display = "none";
}

if (type === "salon" || type === "restaurant") {
  list.innerHTML = `
    <div class="card">
      <strong>Vintage Nail & Beauty</strong><br>
      📍 2.1 km away<br>
      ⏱ 23 min wait
      <div class="badge">Medium</div><br>
      <button class="btn">Join Queue</button>
    </div>

    <div class="card">
      <strong>Roop Beauty Salon</strong><br>
      📍 1.4 km away<br>
      ⏱ 19 min wait
      <div class="badge">Low</div><br>
      <button class="btn">Join Queue</button>
    </div>
  `;
}
</script>

<script
  src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAG-Qv4aH4xE2VFAMImB_xwG4J8TmehUMQ&callback=initMap"
  async defer></script>

<script>
function initMap() {
  if (!type || type === "clinic") return;

  new google.maps.Map(document.getElementById("map"), {
    center: { lat: 53.4808, lng: -2.2426 },
    zoom: 12
  });
}
</script>

</body>
</html>
