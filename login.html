<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login – ZeroWait</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: Arial, sans-serif; background: #f5f7fb; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .card { background: white; padding: 40px; border-radius: 12px; width: 100%; max-width: 400px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .card h2 { margin-top: 0; color: #333; }
        input { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 6px; font-size: 16px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #2563eb; color: white; border: none; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; }
        button:hover { background: #1d4ed8; }
        p { text-align: center; margin-top: 20px; color: #666; }
        p a { color: #2563eb; text-decoration: none; }
        p a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Login to ZeroWait</h2>
        <form id="loginForm">
            <input type="email" id="email" placeholder="Email" required>
            <input type="password" id="password" placeholder="Password" required>
            <button type="submit" id="loginBtn">Login</button>
        </form>
        <p>New user? <a href="signup.html">Create an account</a></p>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script>
        firebase.initializeApp({
            apiKey: "AIzaSyAJFGE5OFfn-OhDNJ_rWO5oi2d2CHl2fXE",
            authDomain: "zerowait-c21fc.firebaseapp.com",
            projectId: "zerowait-c21fc",
            storageBucket: "zerowait-c21fc.firebasestorage.app",
            messagingSenderId: "839269113134",
            appId: "1:839269113134:web:0411874b0e248a2a102ebf"
        });
        const auth = firebase.auth();
        const db = firebase.firestore();

        document.getElementById('loginForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('loginBtn');
            btn.disabled = true;
            btn.innerText = "Logging in...";
            
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            try {
                const cred = await auth.signInWithEmailAndPassword(email, password);
                const doc = await db.collection("providers").doc(cred.user.uid).get();
                if (doc.exists) {
                    window.location.href = "provider-dashboard.html";
                } else {
                    window.location.href = "index.html";
                }
            } catch (err) {
                alert(err.message);
                btn.disabled = false;
                btn.innerText = "Login";
            }
        };
    </script>
</body>
</html>
