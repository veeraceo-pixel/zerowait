<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login | skipQs</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">
<header class="navbar">
  <div class="container nav-content">
    <a href="index.html" class="logo">skipQs</a>
    <nav class="nav-links">
      <a href="index.html">Home</a>
      <a href="about.html">About</a>
      <a href="how-it-works.html">How It Works</a>
      <a href="provider-signup.html" class="btn btn-primary">For Businesses</a>
    </nav>
  </div>
</header>

<main class="py-6">
  <div class="container">
    <div class="form-card animate-fade-in" style="max-width: 450px; margin: 0 auto;">
      <div class="text-center mb-5">
        <h1 class="h3 font-weight-extrabold mb-2">Welcome Back</h1>
        <p class="text-secondary small">Enter your credentials to access your account.</p>
      </div>

      <form id="loginForm">
        <div class="form-group">
          <label class="form-label">Email Address</label>
          <input type="email" id="email" class="form-control" required>
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <input type="password" id="password" class="form-control" required>
        </div>
        <button type="submit" class="btn btn-primary w-100 mt-4">Login</button>
      </form>

      <div class="mt-4 pt-4 border-top text-center">
        <p class="text-secondary small">Don't have an account? <a href="signup.html" class="text-primary font-weight-bold">Sign up here</a></p>
      </div>
    </div>
  </div>
</main>

<footer class="bg-white border-top py-6 mt-6">
  <div class="container text-center">
    <a href="index.html" class="logo mb-4 d-inline-block">skipQs</a>
    <p class="text-muted small">© 2025 skipQs Inc. All rights reserved.</p>
  </div>
</footer>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="firebase-config.js"></script>
<script>
  // Helper function to handle redirects based on user role
  async function redirectUser(user) {
    try {
      const providerSnap = await firebase.firestore()
        .collection('providers')
        .doc(user.uid)
        .get();

      if (providerSnap.exists) {
        window.location.replace('provider-dashboard.html');
      } else {
        window.location.replace('index.html');
      }
    } catch (err) {
      console.error('Role check failed:', err);
      // If Firestore fails but Auth succeeded, default to home
      window.location.replace('index.html');
    }
  }

  // 1. Handle Login Form Submission
  document.getElementById('loginForm').onsubmit = async (e) => {
    e.preventDefault();
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    const submitBtn = e.target.querySelector('button');

    // Disable button to prevent multiple clicks
    submitBtn.disabled = true;
    submitBtn.innerText = 'Logging in...';

    try {
      const cred = await firebase.auth().signInWithEmailAndPassword(email, password);
      await redirectUser(cred.user);
    } catch (err) {
      submitBtn.disabled = false;
      submitBtn.innerText = 'Login';
      
      console.error('Full Firebase Error:', err);
      
      // DIAGNOSTIC ALERT: This reveals the real reason for the 11% error rate
      alert(`Firebase Error!\nCode: ${err.code}\nMessage: ${err.message}`);
      
      // Logic for specific fixes
      if (err.code === 'auth/operation-not-allowed') {
        console.error('Check if Email/Password is enabled in Firebase Console.');
      }
    }
  };

  // 2. Auth State Listener (Automatic Login)
  firebase.auth().onAuthStateChanged((user) => {
    if (user) {
      console.log("Session detected, redirecting...");
      redirectUser(user);
    }
  });
</script>
</body>
</html>
