<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login | ZeroWait</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">
    <header class="navbar">
        <div class="container nav-content">
            <a href="index.html" class="logo">ZeroWait</a>
            <button id="mobile-menu-toggle" aria-label="Toggle Menu">☰</button>
            <nav class="nav-links">
                <a href="index.html">Home</a>
                <a href="provider-signup.html">For Businesses</a>
            </nav>
        </div>
    </header>

    <main class="py-6">
        <div class="container">
            <div class="form-card animate-fade-in">
                <div class="text-center mb-5">
                    <h1 class="h3 font-weight-extrabold mb-2">Welcome Back</h1>
                    <p class="text-secondary small font-weight-bold">Access your ZeroWait account</p>
                </div>
                <form id="loginForm">
                    <div class="form-group">
                        <label class="form-label" for="email">Email Address</label>
                        <input type="email" id="email" class="form-control" required placeholder="name@company.com">
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="password">Password</label>
                        <input type="password" id="password" class="form-control" required placeholder="••••••••">
                    </div>
                    <button type="submit" class="btn btn-primary w-100 py-3 mt-2">Sign In</button>
                </form>
                <div class="mt-5 pt-4 border-top text-center">
                    <p class="text-secondary small">New to ZeroWait? <a href="signup.html" class="text-primary font-weight-bold">Create account</a></p>
                </div>
            </div>
        </div>
    </main>

    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="firebase-config.js"></script>
    <script>
        document.getElementById('loginForm').onsubmit = async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            try {
                const userCredential = await firebase.auth().signInWithEmailAndPassword(email, password);
                const uid = userCredential.user.uid;
                const providerDoc = await firebase.firestore().collection('providers').doc(uid).get();
                window.location.href = providerDoc.exists ? 'provider-dashboard.html' : 'nearby.html';
            } catch (err) { alert('Login failed: ' + err.message); }
        };
        document.getElementById('mobile-menu-toggle').addEventListener('click', function() {
            document.querySelector('.nav-links').classList.toggle('active');
        });
    </script>
</body>
</html>
