<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login | ZeroWait</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>

<body class="bg-light">

<header class="navbar">
  <div class="container nav-content">
    <a href="index.html" class="logo">ZeroWait</a>

    <button id="mobile-menu-toggle"
      aria-label="Toggle Menu"
      style="display:none;background:none;border:none;color:white;font-size:1.5rem;">
      ☰
    </button>

    <nav class="nav-links">
      <a href="index.html">Home</a>
      <a href="about.html">About</a>
      <a href="how-it-works.html">How It Works</a>
      <a href="provider-signup.html" class="btn btn-primary">For Businesses</a>
    </nav>
  </div>
</header>

<main class="py-6">
  <div class="container">
    <div class="form-card animate-fade-in">

      <div class="text-center mb-5">
        <h1 class="h3 font-weight-extrabold mb-2">Welcome Back</h1>
        <p class="text-secondary small font-weight-bold">
          Access your ZeroWait account
        </p>
      </div>

      <form id="loginForm">
        <div class="form-group">
          <label class="form-label">Email Address</label>
          <input type="email" id="email" class="form-control" required>
        </div>

        <div class="form-group">
          <label class="form-label">Password</label>
          <input type="password" id="password" class="form-control" required>
        </div>

        <button type="submit" class="btn btn-primary w-100 py-3 mt-2">
          Sign In
        </button>
      </form>

      <div class="mt-5 pt-4 border-top text-center">
        <p class="text-secondary small">
          New to ZeroWait?
          <a href="signup.html" class="text-primary font-weight-bold">
            Create account
          </a>
        </p>
      </div>

    </div>
  </div>
</main>

<footer>
  <div class="container">
    <p class="text-center text-secondary small">
      © 2025 ZeroWait Inc. All rights reserved.
    </p>
  </div>
</footer>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="firebase-config.js"></script>

<script>
/* Mobile menu */
const mobileToggle = document.getElementById('mobile-menu-toggle');
const navLinks = document.querySelector('.nav-links');
if (mobileToggle) {
  mobileToggle.onclick = () => navLinks.classList.toggle('active');
}

/* LOGIN (OFFLINE SAFE) */
document.getElementById('loginForm').onsubmit = async (e) => {
  e.preventDefault();

  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;

  let user;

  /* 1️⃣ AUTH FIRST — MUST NOT FAIL */
  try {
    const cred = await firebase.auth()
      .signInWithEmailAndPassword(email, password);
    user = cred.user;
  } catch (authErr) {
    alert('Login failed: ' + authErr.message);
    return;
  }
   /* 2️⃣ ROLE CHECK — MUST NOT BLOCK LOGIN */
 let userRole = 'customer'; // Default role
 try {
  const providerSnap = await firebase.firestore()
   .collection('providers')
   .doc(user.uid)
   .get();
  
  if (providerSnap.exists) {
   userRole = 'provider';
  } else {
   const userSnap = await firebase.firestore()
    .collection('users')
    .doc(user.uid)
    .get();
   
   if (userSnap.exists) {
    userRole = 'customer';
   }
  }
 } catch (err) {
  console.warn('Firestore unavailable, defaulting to customer');
 }
 
 /* 3️⃣ ROUTE BY ROLE */
 if (userRole === 'provider') {
  window.location.replace('provider-dashboard.html');
 } else {
  window.location.replace('nearby.html');
 }
};


};
</script>

</body>
</html>
