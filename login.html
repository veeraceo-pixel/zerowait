<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login | ZeroWait</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">
<header class="navbar">
  <div class="container nav-content">
    <a href="index.html" class="logo">ZeroWait</a>
    <nav class="nav-links">
      <a href="index.html">Home</a>
      <a href="about.html">About</a>
      <a href="how-it-works.html">How It Works</a>
      <a href="provider-signup.html" class="btn btn-primary">For Businesses</a>
    </nav>
  </div>
</header>

<main class="py-6">
  <div class="container">
    <div class="form-card animate-fade-in" style="max-width: 450px; margin: 0 auto;">
      <div class="text-center mb-5">
        <h1 class="h3 font-weight-extrabold mb-2">Welcome Back</h1>
        <p class="text-secondary small">Enter your credentials to access your account.</p>
      </div>

      <form id="loginForm">
        <div class="form-group">
          <label class="form-label">Email Address</label>
          <input type="email" id="email" class="form-control" required>
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <input type="password" id="password" class="form-control" required>
        </div>
        <button type="submit" class="btn btn-primary w-100 mt-4">Login</button>
      </form>

      <div class="mt-4 pt-4 border-top text-center">
        <p class="text-secondary small">Don't have an account? <a href="signup.html" class="text-primary font-weight-bold">Sign up here</a></p>
      </div>
    </div>
  </div>
</main>

<footer class="bg-white border-top py-6 mt-6">
  <div class="container text-center">
    <a href="index.html" class="logo mb-4 d-inline-block">ZeroWait</a>
    <p class="text-muted small">© 2025 ZeroWait Inc. All rights reserved.</p>
  </div>
</footer>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="firebase-config.js"></script>

<script>
  document.getElementById('loginForm').onsubmit = async (e) => {
    e.preventDefault();
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;

    try {
      const cred = await firebase.auth().signInWithEmailAndPassword(email, password);
      const user = cred.user;

      // Check if the user is a provider
      const providerSnap = await firebase.firestore()
        .collection('providers')
        .doc(user.uid)
        .get();

      if (providerSnap.exists) {
        window.location.href = 'provider-dashboard.html';
      } else {
        window.location.href = 'index.html';
      }
    } catch (err) {
      alert('Login failed: ' + err.message);
    }
  };

  // If already logged in, redirect based on role
  firebase.auth().onAuthStateChanged(async (user) => {
    if (user) {
      const providerSnap = await firebase.firestore()
        .collection('providers')
        .doc(user.uid)
        .get();
      if (providerSnap.exists) {
        window.location.replace('provider-dashboard.html');
      } else {
        window.location.replace('index.html');
      }
    }
  });
</script>
</body>
</html>
