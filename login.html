<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login – ZeroWait</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { font-family: Arial, sans-serif; background: #f5f7fb; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
    .card { background: white; padding: 40px; border-radius: 12px; width: 100%; max-width: 400px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
    .card h2 { margin-top: 0; color: #333; }
    input { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 6px; font-size: 16px; box-sizing: border-box; }
    input:focus { outline: none; border-color: #2563eb; box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1); }
    button { width: 100%; padding: 12px; background: #2563eb; color: white; border: none; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; transition: background 0.3s; }
    button:hover { background: #1d4ed8; }
    button:disabled { background: #9ca3af; cursor: not-allowed; }
    p { text-align: center; margin-top: 20px; color: #666; }
    p a { color: #2563eb; text-decoration: none; }
    p a:hover { text-decoration: underline; }
    .error { color: #dc2626; font-size: 14px; margin-bottom: 15px; padding: 10px; background: #fee2e2; border-radius: 6px; display: none; }
  </style>
</head>
<body>
  <div class="card">
    <h2>Login to ZeroWait</h2>
    <div id="errorMsg" class="error"></div>
    <form id="loginForm">
      <input type="email" id="email" placeholder="Email" required>
      <input type="password" id="password" placeholder="Password" required>
      <button type="submit" id="loginBtn">Login</button>
    </form>
    <p>New user? <a href="signup.html">Create an account</a></p>
  </div>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script>
    let auth, db;

    function showError(message) {
      const errorMsg = document.getElementById('errorMsg');
      if (errorMsg) {
        errorMsg.textContent = message;
        errorMsg.style.display = 'block';
      }
    }

    function hideError() {
      const errorMsg = document.getElementById('errorMsg');
      if (errorMsg) {
        errorMsg.style.display = 'none';
      }
    }

    function initializeFirebase() {
      try {
        if (typeof firebase !== 'undefined' && !firebase.apps.length) {
          // Load config from secure backend endpoint
          fetch('/api/firebase-config')
            .then(r => {
              if (!r.ok) throw new Error('Failed to load Firebase config');
              return r.json();
            })
            .then(config => {
              firebase.initializeApp(config);
              auth = firebase.auth();
              db = firebase.firestore();
              setupAuthListener();
            })
            .catch(err => {
              console.error('Firebase init error:', err);
              showError('Unable to initialize authentication. Please try again later.');
            });
        }
      } catch (err) {
        console.error('Firebase initialization failed:', err);
        showError('System error. Please refresh and try again.');
      }
    }

    function setupAuthListener() {
      if (!auth) return;
      auth.onAuthStateChanged(user => {
        // If already logged in, redirect to appropriate dashboard
        if (user) {
          redirectToDashboard(user.uid);
        }
      });
    }

    function redirectToDashboard(uid) {
      if (!db) return;
      db.collection('providers').doc(uid).get()
        .then(doc => {
          if (doc.exists) {
            window.location.href = 'provider-dashboard.html';
          } else {
            window.location.href = 'index.html';
          }
        })
        .catch(err => {
          console.error('Error checking provider status:', err);
          window.location.href = 'index.html';
        });
    }

    // Handle login form submission
    document.getElementById('loginForm').onsubmit = async (e) => {
      e.preventDefault();
      hideError();

      if (!auth) {
        showError('Authentication service not ready. Please refresh the page.');
        return;
      }

      const btn = document.getElementById('loginBtn');
      if (!btn) return;
      
      btn.disabled = true;
      btn.innerText = 'Logging in...';

      try {
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');

        if (!emailInput || !passwordInput) {
          throw new Error('Form inputs not found');
        }

        const email = emailInput.value.trim();
        const password = passwordInput.value;

        if (!email || !password) {
          throw new Error('Please enter both email and password');
        }

        const cred = await auth.signInWithEmailAndPassword(email, password);
        redirectToDashboard(cred.user.uid);
      } catch (err) {
        console.error('Login error:', err);
        
        let errorMessage = 'Login failed';
        if (err.code === 'auth/user-not-found') {
          errorMessage = 'User not found. Please sign up first.';
        } else if (err.code === 'auth/wrong-password') {
          errorMessage = 'Incorrect password. Please try again.';
        } else if (err.code === 'auth/invalid-email') {
          errorMessage = 'Invalid email address.';
        } else if (err.code === 'auth/user-disabled') {
          errorMessage = 'This account has been disabled.';
        } else if (err.message) {
          errorMessage = err.message;
        }
        
        showError(errorMessage);
        btn.disabled = false;
        btn.innerText = 'Login';
      }
    };

    // Initialize on page load
    document.addEventListener('DOMContentLoaded', initializeFirebase);
  </script>
</body>
</html>
