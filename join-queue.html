<script>
        let db, currentUserId, providerId;

        function init() {
            db = firebase.firestore();
            firebase.auth().onAuthStateChanged(async user => {
                if (!user) {
                    // Not logged in? Save the provider ID and go to login
                    const params = new URLSearchParams(window.location.search);
                    const idFromUrl = params.get('id');
                    if (idFromUrl) localStorage.setItem('pendingJoin', idFromUrl);
                    
                    console.log("No user found, redirecting to login...");
                    window.location.href = 'login.html'; 
                    return;
                }

                currentUserId = user.uid;
                console.log("Logged in as:", currentUserId);

                // Get Provider ID from URL or LocalStorage
                const params = new URLSearchParams(window.location.search);
                providerId = params.get('id') || localStorage.getItem('pendingJoin');
                
                if (!providerId) {
                    alert("No Business ID found. Please scan the QR code again.");
                    return;
                }

                checkExistingQueue();
            });
        }

        async function checkExistingQueue() {
            try {
                console.log("Checking for existing entries for provider:", providerId);
                
                // Look for an active queue for THIS specific user at THIS specific business
                const snap = await db.collection('queues')
                    .where('customerId', '==', currentUserId)
                    .where('providerId', '==', providerId)
                    .where('status', 'in', ['waiting', 'serving'])
                    .get();

                if (!snap.empty) {
                    console.log("Existing entry found. Starting listener...");
                    startListener(snap.docs[0].id);
                } else {
                    console.log("No entry found. Showing name form.");
                    document.getElementById('status-msg').style.display = 'none';
                    document.getElementById('nameForm').style.display = 'block';
                }
            } catch (error) {
                console.error("Database error:", error);
                alert("Connection Error: " + error.message);
            }
        }

        async function joinQueueWithName(event) {
            event.preventDefault();
            const name = document.getElementById('customerName').value.trim();
            
            const btn = event.target.querySelector('button');
            btn.disabled = true;
            btn.innerText = "Joining...";

            try {
                const newEntry = await db.collection('queues').add({
                    customerId: currentUserId,
                    customerName: name,
                    providerId: providerId,
                    status: 'waiting',
                    joinedAt: firebase.firestore.FieldValue.serverTimestamp()
                });
                
                console.log("Joined successfully! Entry ID:", newEntry.id);
                localStorage.removeItem('pendingJoin');
                startListener(newEntry.id);
            } catch (error) {
                console.error("Join error:", error);
                alert("Failed to join: " + error.message);
                btn.disabled = false;
                btn.innerText = "Join Queue";
            }
        }

        // ... keep your existing startListener and leaveQueue functions below ...
    </script>
