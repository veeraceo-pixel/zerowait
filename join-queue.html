<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Join Queue – ZeroWait</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="style.css">
  <style>
    body { display: flex; flex-direction: column; min-height: 100vh; }
    .main-content { flex: 1; display: flex; justify-content: center; align-items: center; padding: 2rem; }
    .card { max-width: 400px; width: 100%; }
  </style>
</head>
<body>
  <header class="navbar">
    <a href="index.html" class="logo">ZeroWait</a>
    <nav class="nav-links">
      <a href="index.html">Home</a>
      <a href="nearby.html">Nearby</a>
    </nav>
  </header>

  <main class="main-content">
    <div class="category-card card">
      <h2 style="margin-bottom: 1rem;">Join Queue</h2>
      <p id="status" style="color: var(--text-muted); margin-bottom: 1.5rem;">Enter your name to join the queue for <strong id="providerName">this provider</strong></p>
      <input id="nameInput" type="text" placeholder="Your Full Name" style="width: 100%; padding: 0.75rem; border-radius: 0.5rem; border: 1px solid #e2e8f0; margin-bottom: 1.25rem; font-size: 1rem;">
      <button id="joinBtn" class="btn btn-primary" style="width: 100%;">Join Queue</button>
    </div>
  </main>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyAJFGE5OFfn-OhDNJ_rWO5oi2d2CHl2fXE",
      authDomain: "zerowait-c21fc.firebaseapp.com",
      projectId: "zerowait-c21fc",
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    const params = new URLSearchParams(window.location.search);
    const providerId = params.get("provider");
    const providerName = params.get("name") || "this provider";
    document.getElementById("providerName").innerText = decodeURIComponent(providerName);

    if (!providerId) {
      document.getElementById("status").innerText = "Invalid queue link";
      document.getElementById("joinBtn").disabled = true;
    }

    document.getElementById("joinBtn").onclick = async () => {
      const name = document.getElementById("nameInput").value.trim();
      if (!name) { alert("Please enter your name"); return; }
      
      const btn = document.getElementById("joinBtn");
      btn.disabled = true;
      btn.innerText = "Joining...";
      
      try {
        const queueRef = db.collection("queues").doc(providerId);
        await queueRef.update({
          customers: firebase.firestore.FieldValue.arrayUnion({
            name,
            joinedAt: Date.now()
          })
        });
        document.querySelector(".main-content").innerHTML = `
          <div class="category-card card" style="text-align: center;">
            <div style="font-size: 3rem; margin-bottom: 1rem;">✅</div>
            <h2>Added to Queue</h2>
            <p style="color: var(--text-muted); margin-top: 0.5rem;">Please wait, you will be called shortly.</p>
            <a href="index.html" class="btn btn-outline" style="margin-top: 1.5rem;">Back to Home</a>
          </div>
        `;
      } catch (err) {
        alert("Queue not available. Please try again later.");
        btn.disabled = false;
        btn.innerText = "Join Queue";
      }
    };
  </script>
</body>
</html>
