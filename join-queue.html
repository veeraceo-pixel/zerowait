<script>
    const db = firebase.firestore();
    let providerId = "";
    let currentUid = "";

    window.onload = () => {
        const params = new URLSearchParams(window.location.search);
        // We check for both 'id' and 'provider' just in case
        providerId = params.get('id') || params.get('provider');
        
        console.log("Detected Provider ID:", providerId);

        if (!providerId) {
            alert("QR Code Error: No Business ID found in the link.");
            return;
        }

        firebase.auth().onAuthStateChanged(user => {
            if (!user) {
                console.log("User not logged in, redirecting...");
                localStorage.setItem('pendingJoin', providerId);
                window.location.href = 'login.html';
            } else {
                currentUid = user.uid;
                console.log("Logged in as:", currentUid);
            }
        });
    };

   async function joinQueue() {
    const nameInput = document.getElementById('custName');
    const name = nameInput.value.trim();
    
    if (!name) {
        alert("Please enter your name");
        return;
    }

    const btn = document.getElementById('joinBtn');
    btn.disabled = true;
    btn.innerText = "Joining...";

    try {
        console.log("Saving to database...");
        // Add the customer to the 'queues' collection
        const docRef = await db.collection('queues').add({
            customerId: currentUid,
            customerName: name,
            providerId: providerId,
            status: 'waiting',
            joinedAt: firebase.firestore.FieldValue.serverTimestamp()
        });

        console.log("Success! Document ID:", docRef.id);
        
        // MANUALLY trigger the screen switch
        startLiveUpdates(docRef.id);

    } catch (err) {
        console.error("Join Error:", err);
        alert("Error joining queue: " + err.message);
        btn.disabled = false;
        btn.innerText = "Join Now";
    }
}

    function startLiveUpdates(queueId) {
        document.getElementById('joinSection').classList.add('hidden');
        document.getElementById('statusSection').classList.remove('hidden');

        // This listener updates your position in real-time
        db.collection('queues')
            .where('providerId', '==', providerId)
            .where('status', 'in', ['waiting', 'serving'])
            .onSnapshot(snap => {
                const docs = snap.docs.map(d => ({id: d.id, ...d.data()}))
                                  .sort((a, b) => (a.joinedAt?.seconds || 0) - (b.joinedAt?.seconds || 0));
                
                const myPos = docs.findIndex(d => d.id === queueId) + 1;
                
                if (myPos > 0) {
                    document.getElementById('posNumber').innerText = myPos;
                    document.getElementById('waitTimeDisplay').innerText = myPos * 10; 
                }
            }, (error) => {
                console.log("Snapshot error:", error);
            });
    }
</script>
