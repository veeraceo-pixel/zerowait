<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Account – ZeroWait</title>
  <style>
    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background-color: #f3f4f6;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }
    .card {
      background: white;
      padding: 2.5rem;
      border-radius: 12px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.05);
      width: 100%;
      max-width: 400px;
    }
    h2 { margin-bottom: 1.5rem; color: #1f2937; }
    input {
      width: 100%;
      padding: 0.75rem;
      margin-bottom: 1rem;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      box-sizing: border-box;
    }
    button {
      width: 100%;
      padding: 0.75rem;
      background-color: #2563eb;
      color: white;
      border: none;
      border-radius: 6px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover { background-color: #1d4ed8; }
    .footer-text { text-align: center; margin-top: 1rem; font-size: 0.9rem; color: #6b7280; }
    .footer-text a { color: #2563eb; text-decoration: none; }

    /* Modal Styles */
    .modal-overlay {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0, 0, 0, 0.5);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }
    .modal-content {
      background: white;
      padding: 2rem;
      border-radius: 12px;
      text-align: center;
      max-width: 320px;
      box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
    }
    .modal-content h3 { color: #059669; margin-bottom: 0.5rem; }
    .modal-content p { color: #4b5563; margin-bottom: 1.5rem; }
  </style>
</head>
<body>

  <div class="card">
    <h2>Create Account</h2>
    <form id="signupForm">
      <input type="text" id="fullName" placeholder="Full Name" required>
      <input type="email" id="email" placeholder="Email" required>
      <input type="password" id="password" placeholder="Password" required>
      <button type="submit">Sign Up</button>
    </form>
    <div class="footer-text">
      Already have an account? <a href="login.html">Login here</a>
    </div>
  </div>

  <!-- Success Popup -->
  <div id="successModal" class="modal-overlay">
    <div class="modal-content">
      <h3>✅ Success!</h3>
      <p>Your account has been created successfully. Welcome to ZeroWait!</p>
      <button onclick="window.location.href='login.html'">Go to Login</button>
    </div>
  </div>

  <script>
    document.getElementById('signupForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const btn = this.querySelector('button');
      btn.innerText = 'Creating account...';
      btn.disabled = true;
      setTimeout(() => {
        document.getElementById('successModal').style.display = 'flex';
      }, 800);
    });
  </script>

</body>
</html>
