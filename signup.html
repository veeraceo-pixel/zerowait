<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Create Account | skipQs</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">
    <header class="navbar">
        <div class="container nav-content">
            <a href="index.html" class="logo">skipQs</a>
            <button id="mobile-menu-toggle" aria-label="Toggle Menu">☰</button>
            <nav class="nav-links">
                <a href="index.html">Home</a>
                <a href="login.html">Login</a>
                <a href="provider-signup.html" class="btn btn-primary">For Businesses</a>
            </nav>
        </div>
    </header>

    <main class="py-6">
        <div class="container">
            <div class="form-card animate-fade-in">
                <div class="text-center mb-5">
                    <h1 class="h3 font-weight-extrabold mb-2">Create Account</h1>
                    <p class="text-secondary small font-weight-bold">Join skipQs to skip the line</p>
                </div>
                <form id="signupForm">
                    <div class="form-group">
                        <label class="form-label" for="name">Full Name</label>
                        <input type="text" id="name" class="form-control" required placeholder="John Doe">
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="email">Email Address</label>
                        <input type="email" id="email" class="form-control" required placeholder="john@example.com">
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="phone">Phone Number (Optional)</label>
                        <input type="tel" id="phone" class="form-control" placeholder="+44 7000 000000">
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="password">Password</label>
                        <input type="password" id="password" class="form-control" required placeholder="At least 8 characters">
                    </div>
                    <button type="submit" class="btn btn-primary w-100 py-3 mt-2">Create Account</button>
                </form>
                <div class="mt-5 pt-4 border-top text-center">
                    <p class="text-secondary small">Already have an account? <a href="login.html" class="text-primary font-weight-bold">Log in</a></p>
                </div>
            </div>
        </div>
    </main>

    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="firebase-config.js"></script>
    <script>
        document.getElementById('signupForm').onsubmit = async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const name = document.getElementById('name').value;
            const phone = document.getElementById('phone').value;
            try {
                const userCredential = await firebase.auth().createUserWithEmailAndPassword(email, password);
                await firebase.firestore().collection('users').doc(userCredential.user.uid).set({ name, email, phone, role: 'customer', createdAt: firebase.firestore.FieldValue.serverTimestamp() });
                alert('Account created successfully!'); window.location.href = 'nearby.html';
            } catch (err) { alert('Signup failed: ' + err.message); }
        };
        document.getElementById('mobile-menu-toggle').addEventListener('click', function() {
            document.querySelector('.nav-links').classList.toggle('active');
        });
    </script>
</body>
</html>
