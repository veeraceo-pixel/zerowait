<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account - ZeroWait</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">
    <header class="navbar">
        <div class="container nav-content">
            <a href="index.html" class="logo">ZeroWait</a>
            <button id="mobile-menu-toggle">☰</button>
            <nav class="nav-links">
                <a href="index.html">Home</a>
                <a href="login.html" class="btn btn-outline">Login</a>
            </nav>
        </div>
    </header>

    <main class="py-6">
        <div class="container">
            <div class="form-card">
                <div class="text-center mb-5">
                    <h1 class="h3 font-weight-extrabold mb-2">Create Account</h1>
                    <p class="text-secondary small">Join ZeroWait to skip lines and save time.</p>
                </div>

                <form id="signupForm">
                    <div class="form-group">
                        <label class="form-label" for="fullName">Full Name</label>
                        <input type="text" id="fullName" class="form-control" required placeholder="John Doe">
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="email">Email Address</label>
                        <input type="email" id="email" class="form-control" required placeholder="name@email.com">
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="password">Password</label>
                        <input type="password" id="password" class="form-control" required placeholder="At least 8 characters">
                    </div>
                    <button type="submit" class="btn btn-primary" style="width: 100%; padding: 0.875rem;">Create My Account</button>
                </form>

                <div class="mt-5 text-center">
                    <p class="text-secondary small">
                        Already have an account? <a href="login.html" class="text-primary font-weight-bold" style="text-decoration: none;">Log in</a>
                    </p>
                </div>
            </div>
        </div>
    </main>

    <!-- Success Modal -->
    <div id="successModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:2000; align-items:center; justify-content:center;">
        <div class="card p-5 text-center" style="max-width: 400px; width: 90%;">
            <div style="font-size: 4rem; margin-bottom: 1rem;">✅</div>
            <h3 class="h4 font-weight-bold mb-3">Signup Successful!</h3>
            <p class="text-secondary mb-4">Your account has been created. You can now start joining virtual queues.</p>
            <button onclick="window.location.href='index.html'" class="btn btn-primary" style="width:100%">Continue</button>
        </div>
    </div>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    
    <!-- Central Config -->
    <script src="firebase-config.js"></script>

    <script>
        document.getElementById('signupForm').onsubmit = async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const fullName = document.getElementById('fullName').value;

            try {
                const userCredential = await firebase.auth().createUserWithEmailAndPassword(email, password);
                await firebase.firestore().collection('users').doc(userCredential.user.uid).set({
                    fullName,
                    email,
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });

                document.getElementById('successModal').style.display = 'flex';
            } catch (err) {
                alert('Signup failed: ' + err.message);
            }
        };

        document.getElementById('mobile-menu-toggle').addEventListener('click', function() {
            document.querySelector('.nav-links').classList.toggle('active');
        });
    </script>
</body>
</html>
