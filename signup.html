<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create Account – ZeroWait</title>

<style>
body {
  font-family: system-ui, -apple-system, sans-serif;
  background-color: #f3f4f6;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  margin: 0;
}

.card {
  background: white;
  padding: 2.5rem;
  border-radius: 12px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.05);
  width: 100%;
  max-width: 400px;
}

h2 { margin-bottom: 1.5rem; }

input {
  width: 100%;
  padding: 0.75rem;
  margin-bottom: 1rem;
  border: 1px solid #d1d5db;
  border-radius: 6px;
}

button {
  width: 100%;
  padding: 0.75rem;
  background-color: #2563eb;
  color: white;
  border: none;
  border-radius: 6px;
  font-weight: 600;
  cursor: pointer;
}

button:disabled {
  background: #9ca3af;
}

.footer-text {
  text-align: center;
  margin-top: 1rem;
  font-size: 0.9rem;
}

.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);
  display: none;
  justify-content: center;
  align-items: center;
}

.modal-content {
  background: white;
  padding: 2rem;
  border-radius: 12px;
  text-align: center;
  max-width: 320px;
}
</style>
</head>

<body>

<div class="card">
  <h2>Create Account</h2>
  <form id="signupForm">
    <input type="text" id="fullName" placeholder="Full Name" required>
    <input type="email" id="email" placeholder="Email" required>
    <input type="password" id="password" placeholder="Password (min 6 chars)" required>
    <button type="submit">Sign Up</button>
  </form>
  <div class="footer-text">
    Already have an account? <a href="login.html">Login</a>
  </div>
</div>

<!-- SUCCESS MODAL -->
<div id="successModal" class="modal-overlay">
  <div class="modal-content">
    <h3>✅ Account Created</h3>
    <p>Welcome to ZeroWait!</p>
    <button onclick="window.location.href='login.html'">Go to Login</button>
  </div>
</div>

<!-- FIREBASE SDK -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>
/* 🔥 FIREBASE CONFIG */
const firebaseConfig = {
  apiKey: "AIzaSyAJFGE5OFfn-OhDNJ_rWO5oi2d2CHl2fXE",
  authDomain: "zerowait-c21fc.firebaseapp.com",
  projectId: "zerowait-c21fc"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

/* 🧠 SIGNUP LOGIC */
document.getElementById("signupForm").addEventListener("submit", async e => {
  e.preventDefault();

  const btn = e.target.querySelector("button");
  btn.disabled = true;
  btn.innerText = "Creating account...";

  const name = fullName.value.trim();
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value;

  try {
    // 1️⃣ Create Auth User
    const cred = await auth.createUserWithEmailAndPassword(email, password);

    // 2️⃣ Save User Profile
    await db.collection("users").doc(cred.user.uid).set({
      name,
      email,
      role: "customer",
      createdAt: firebase.firestore.FieldValue.serverTimestamp()
    });

    // 3️⃣ Show Success
    document.getElementById("successModal").style.display = "flex";

  } catch (err) {
    alert(err.message);
    btn.disabled = false;
    btn.innerText = "Sign Up";
  }
});
</script>

</body>
</html>
