<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ZeroWait – Skip the Wait</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f8fafc;
}

header {
  height: 70px;
  background: white;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 30px;
  box-shadow: 0 1px 6px rgba(0,0,0,0.08);
}

.logo {
  font-size: 22px;
  font-weight: bold;
  color: #2563eb;
}

nav a {
  margin-left: 20px;

}

.hero {

.hero h1 {

  margin-bottom: 10px;
}

.hero p {

  margin-bottom: 35px;
}

.main-btn {
  background: #2563eb;
  color: white;
  border: none;
  padding: 16px 32px;
  border-radius: 8px;
  font-size: 16px;
  opacity: 0.85;
  cursor: default;
}

.categories {
  margin-top: 35px;
  display: flex;
  justify-content: center;
  gap: 20px;
  flex-wrap: wrap;
}

.category {
  display: inline-block;
  background: #eff6ff;
  border: 2px solid #2563eb;
  color: #2563eb;
  padding: 20px 30px;
  border-radius: 14px;
  font-size: 18px;
  font-weight: 600;
  text-decoration: none;
  transition: 0.2s;
  min-width: 180px;
}

.category:hover {
  background: #2563eb;
  color: white;
  transform: translateY(-3px);

footer {
  margin-top: 60px;
