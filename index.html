<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ZeroWait – Skip the Wait</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f5f7fb;
}

header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 15px 40px;
  background: white;
  border-bottom: 1px solid #ddd;
}

.logo {
  font-size: 22px;
  font-weight: bold;
  color: #2563eb;
}

nav a {
  margin-left: 25px;
  text-decoration: none;
  color: #333;
  font-weight: 500;
}

.hero {
  text-align: center;
  padding: 80px 20px;
}

.hero h1 {
  font-size: 40px;
}

.hero button {
  background: #2563eb;
  color: white;
  border: none;
  padding: 12px 22px;
  font-size: 16px;
  border-radius: 8px;
  margin-top: 20px;
}

.categories {
  display: flex;
  justify-content: center;
  gap: 20px;
  margin-top: 40px;
}

.category {
  background: #2563eb;
  color: white;
  padding: 18px 30px;
  border-radius: 10px;
  cursor: pointer;
  font-size: 18px;
}
</style>
</head>

<body>

<header>
  <div class="logo">ZeroWait</div>
  <nav>
    <a href="index.html">Home</a>
    <a href="#">About Us</a>
    <a href="#">How It Works</a>
    <a href="#">Login</a>
  </nav>
</header>

<div class="hero">
  <h1>Never Wait Again — Book Instantly</h1>
  <p>Find nearby services with real-time waiting times.</p>
  <button disabled>Find Services Near Me</button>

  <div class="categories">
    <div class="category" onclick="go('salon')">💇 Salon</div>
    <div class="category" onclick="go('restaurant')">🍽 Restaurant</div>
    <div class="category" onclick="go('clinic')">🏥 Clinic</div>
  </div>
</div>

<script>
function go(type) {
  window.location.href = `nearby.html?type=${type}`;
}
</script>

</body>
</html>
