<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ZeroWait – Skip the Wait</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f8fafc;
}

header {
  height: 70px;
  background: white;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 30px;
  box-shadow: 0 1px 6px rgba(0,0,0,0.08);
}

.logo {
  font-size: 22px;
  font-weight: bold;
  color: #2563eb;
}

nav a {
  margin-left: 20px;
  text-decoration: none;
  color: #333;
}

.hero {
  text-align: center;
  padding: 90px 20px;
}

.hero h1 {
  font-size: 42px;
}

.hero p {
  color: #555;
  font-size: 18px;
  margin-bottom: 30px;
}

.main-btn {
  background: #2563eb;
  color: white;
  border: none;
  padding: 16px 32px;
  border-radius: 8px;
  font-size: 16px;
  cursor: pointer;
}

.categories {
  margin-top: 40px;
  display: flex;
  justify-content: center;
  gap: 20px;
  flex-wrap: wrap;
}

.category {
  background: #eff6ff;
  border: 2px solid #2563eb;
  color: #2563eb;
  padding: 20px 30px;
  border-radius: 14px;
  font-size: 18px;
  font-weight: 600;
  text-decoration: none;
  transition: 0.2s;
  min-width: 180px;
}

.category:hover {
  background: #2563eb;
  color: white;
  transform: translateY(-3px);
}

footer {
  margin-top: 60px;
  text-align: center;
  color: #666;
}
</style>
</head>

<body>

<header>
  <div class="logo">ZeroWait</div>
  <nav>
    <a href="index.html">Home</a>
    <a href="about.html">About Us</a>
    <a href="how-it-works.html">How It Works</a>
    <a href="login.html">Login</a>
  </nav>
</header>

<section class="hero">
  <h1>Never Wait Again — Book Instantly</h1>
  <p>Find nearby services and join queues in seconds.</p>

  <!-- Scroll Button -->
  <button class="main-btn" onclick="document.getElementById('cats').scrollIntoView({behavior:'smooth'})">
    📍 Find Services Near Me
  </button>

  <div id="cats" class="categories">
    <a class="category" href="nearby.html?service=salon">💇 Salon</a>
    <a class="category" href="nearby.html?service=restaurant">🍽 Restaurant</a>
    <a class="category" href="nearby.html?service=clinic">🏥 Clinic</a>
  </div>
</section>

<footer>© 2025 ZeroWait</footer>

</body>
</html>
