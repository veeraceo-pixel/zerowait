<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Business Registration | skipQs</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .pac-container { z-index: 10000 !important; border-radius: 8px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); border: 1px solid #e5e7eb; font-family: 'Inter', sans-serif; }
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 2000; align-items: center; justify-content: center; }
        .success-modal { background: white; padding: 3rem; border-radius: 12px; max-width: 450px; width: 90%; text-align: center; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); }
        .success-icon { width: 64px; height: 64px; background: #f0fdf4; color: #166534; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 2rem; margin: 0 auto 1.5rem; }
    </style>
</head>
<body class="bg-light">
    <header class="navbar">
        <div class="container nav-content">
            <a href="index.html" class="logo">skipQs</a>
            <nav class="nav-links">
                <a href="index.html">Home</a>
                <a href="login.html" class="btn btn-primary">Login</a>
            </nav>
        </div>
    </header>

    <main class="py-6">
        <div class="container">
            <div class="form-card" style="max-width: 600px; margin: 0 auto;">
                <div class="text-center mb-5">
                    <div class="badge text-primary bg-primary-light mb-3">Partner with us</div>
                    <h1 class="h2 font-weight-extrabold mb-2">Register Your Business</h1>
                    <p class="text-secondary small">Join thousands of businesses eliminating physical lines.</p>
                </div>

                <form id="providerSignupForm">
                    <div class="form-group">
                        <label class="form-label">Business Name</label>
                        <input type="text" id="businessName" class="form-control" placeholder="Enter your business name" required>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Service Type</label>
                        <select id="serviceType" class="form-control" required>
                            <option value="salon">Salon & Spa</option>
                            <option value="restaurant">Restaurant / Cafe</option>
                            <option value="clinic">Health Clinic</option>
                            <option value="other">Other Service</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Business Address (Search to confirm location)</label>
                        <input type="text" id="addressLookup" class="form-control" placeholder="Search your business address" required>
                        <input type="hidden" id="placeId">
                        <input type="hidden" id="lat">
                        <input type="hidden" id="lng">
                        <input type="hidden" id="formattedAddress">
                    </div>

                    <div class="form-group">
                        <label class="form-label">Work Email</label>
                        <input type="email" id="email" class="form-control" required>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Password</label>
                        <input type="password" id="password" class="form-control" required minlength="6">
                    </div>

                    <div class="form-group">
                        <label class="form-label">Typical Wait Time (Minutes)</label>
                        <input type="number" id="avgWait" class="form-control" required min="1">
                    </div>

                    <button type="submit" id="submitBtn" class="btn btn-primary btn-block">Create Business Account</button>
                </form>

                <div class="text-center mt-4">
                    <p class="text-secondary small">Already have a business account? <a href="login.html" class="text-primary font-weight-bold">Log in here</a></p>
                </div>
            </div>
        </div>
    </main>

    <div id="successModal" class="modal-overlay">
        <div class="success-modal">
            <div class="success-icon">✓</div>
            <h2 class="h3 mb-2">Registration Successful!</h2>
            <p class="text-secondary mb-4">Your business account has been created.</p>
            <button class="btn btn-primary btn-block" onclick="window.location.replace('provider-dashboard.html')">Go to Dashboard</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    
    <script src="firebase-config.js"></script>

    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAJFGE5OFfn-OhDNJ_rWO5oi2d2CHl2fXE&libraries=places"></script>

    <script>
        // Google Maps Autocomplete
        let autocomplete;
        function initAutocomplete() {
            const input = document.getElementById('addressLookup');
            autocomplete = new google.maps.places.Autocomplete(input);
            autocomplete.addListener("place_changed", () => {
                const place = autocomplete.getPlace();
                if (!place.geometry) {
                    alert("Please select an address from the suggestions.");
                    return;
                }
                document.getElementById('placeId').value = place.place_id;
                document.getElementById('lat').value = place.geometry.location.lat();
                document.getElementById('lng').value = place.geometry.location.lng();
                document.getElementById('formattedAddress').value = place.formatted_address;
            });
        }
        window.onload = initAutocomplete;

        // Unified Signup and Firestore Logic
        document.getElementById('providerSignupForm').onsubmit = async (e) => {
            e.preventDefault();
            const submitBtn = document.getElementById('submitBtn');
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const placeId = document.getElementById('placeId').value;

            if (!placeId) {
                alert('Please select an address from the dropdown suggestions to confirm location.');
                return;
            }

            const providerData = {
                businessName: document.getElementById('businessName').value,
                type: document.getElementById('serviceType').value,
                avgWait: parseInt(document.getElementById('avgWait').value),
                email: email,
                role: 'provider',
                isOpen: true,
                location: {
                    placeId: placeId,
                    lat: parseFloat(document.getElementById('lat').value),
                    lng: parseFloat(document.getElementById('lng').value),
                    address: document.getElementById('formattedAddress').value
                },
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            };

            try {
                submitBtn.disabled = true;
                submitBtn.innerText = 'Creating Account...';

                // 1. Create Auth User
                const cred = await firebase.auth().createUserWithEmailAndPassword(email, password);
                
                // 2. Create entry in 'providers' collection
                await firebase.firestore().collection('providers').doc(cred.user.uid).set(providerData);
                
                // 3. Show Success UI
                document.getElementById('successModal').style.display = 'flex';
                
            } catch (err) {
                submitBtn.disabled = false;
                submitBtn.innerText = 'Create Business Account';
                console.error("Signup failed:", err);
                
                // Detailed error alert to catch "Missing Permissions" or "Network Error"
                alert("Signup Error!\nCode: " + err.code + "\nMessage: " + err.message);
            }
        };
    </script>
</body>
</html>
