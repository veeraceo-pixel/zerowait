<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Provider Dashboard – ZeroWait</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f5f7fb;
}

header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 15px 40px;
  background: white;
  border-bottom: 1px solid #ddd;
}

.logo {
  font-size: 22px;
  font-weight: bold;
  color: #2563eb;
}

.logout {
  cursor: pointer;
  color: #2563eb;
  font-weight: bold;
}

.container {
  max-width: 900px;
  margin: 30px auto;
  padding: 20px;
}

.card {
  background: white;
  padding: 20px;
  border-radius: 12px;
  margin-bottom: 20px;
}

.queue-item {
  padding: 10px;
  border-bottom: 1px solid #eee;
}

.btn {
  padding: 10px 16px;
  background: #2563eb;
  color: white;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}

.btn.secondary {
  background: #e5edff;
  color: #2563eb;
}

.btn.danger {
  background: #ef4444;
}
</style>
</head>

<body>

<header>
  <div class="logo">ZeroWait – Provider</div>
  <div class="logout" onclick="logout()">Logout</div>
</header>

<div class="container">

  <div class="card">
    <h2 id="businessName">Loading...</h2>
    <p>
      Service: <strong id="serviceType"></strong><br>
      Avg Service Time: <strong id="avgTime"></strong> mins<br>
      Status: <strong id="status"></strong>
    </p>
    <button class="btn secondary" onclick="toggleStatus()">Toggle Open / Close</button>
  </div>

  <div class="card">
    <h3>Live Queue</h3>
    <div id="queueList">Loading queue...</div>
    <br>
    <button class="btn" onclick="addCustomer()">➕ Add Customer</button>
    <button class="btn danger" onclick="serveNext()">✔ Serve Next</button>
  </div>

</div>

<!-- Firebase SDKs -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>
/* ================================
   FIREBASE CONFIG (YOUR PROJECT)
================================ */
const firebaseConfig = {
  apiKey: "AIzaSyAJFGE5OFfn-OhDNJ_rWO5oi2d2CHl2fXE",
  authDomain: "zerowait-c21fc.firebaseapp.com",
  projectId: "zerowait-c21fc",
  storageBucket: "zerowait-c21fc.firebasestorage.app",
  messagingSenderId: "839269113134",
  appId: "1:839269113134:web:0411874b0e248a2a102ebf"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

let providerId = null;

/* ================================
   AUTH GUARD
================================ */
auth.onAuthStateChanged(user => {
  if (!user) {
    window.location.href = "provider-signup.html";
    return;
  }

  providerId = user.uid;
  loadProvider();
  loadQueue();
});

/* ================================
   LOAD PROVIDER DATA
================================ */
function loadProvider() {
  db.collection("providers").doc(providerId).get()
    .then(doc => {
      if (!doc.exists) return;

      const data = doc.data();
      document.getElementById("businessName").innerText = data.name;
      document.getElementById("serviceType").innerText = data.serviceType;
      document.getElementById("avgTime").innerText = data.avgServiceTime;
      document.getElementById("status").innerText = data.isOpen ? "Open" : "Closed";
    });
}

/* ================================
   QUEUE FUNCTIONS
================================ */
function loadQueue() {
  db.collection("queues").doc(providerId)
    .onSnapshot(doc => {
      const container = document.getElementById("queueList");
      container.innerHTML = "";

      if (!doc.exists || !doc.data().customers?.length) {
        container.innerHTML = "<p>No customers in queue</p>";
        return;
      }

      doc.data().customers.forEach((c, i) => {
        container.innerHTML += `
          <div class="queue-item">
            ${i + 1}. ${c.name}
          </div>
        `;
      });
    });
}

function addCustomer() {
  const name = prompt("Customer name?");
  if (!name) return;

  const ref = db.collection("queues").doc(providerId);

  ref.set({
    customers: firebase.firestore.FieldValue.arrayUnion({
      name,
      joinedAt: new Date()
    })
  }, { merge: true });
}

function serveNext() {
  const ref = db.collection("queues").doc(providerId);

  ref.get().then(doc => {
    if (!doc.exists || !doc.data().customers.length) return;

    const customers = doc.data().customers;
    customers.shift();

    ref.update({ customers });
  });
}

/* ================================
   STATUS TOGGLE
================================ */
function toggleStatus() {
  const ref = db.collection("providers").doc(providerId);

  ref.get().then(doc => {
    if (!doc.exists) return;
    ref.update({ isOpen: !doc.data().isOpen });
  });
}

/* ================================
   LOGOUT
================================ */
function logout() {
  auth.signOut().then(() => {
    window.location.href = "index.html";
  });
}
</script>

</body>
</html>
