<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Business Registration | skipQs</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #2563eb; --primary-hover: #1d4ed8; --bg-light: #f8fafc; --text-main: #1e293b; --text-muted: #64748b; --border: #e2e8f0; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg-light); color: var(--text-main); margin: 0; line-height: 1.5; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .form-card { background: white; padding: 2.5rem; border-radius: 1rem; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 450px; }
        .header-section { text-align: center; margin-bottom: 2rem; }
        .form-group { margin-bottom: 1.25rem; }
        .form-label { display: block; font-weight: 600; font-size: 0.875rem; margin-bottom: 0.5rem; }
        .form-control { width: 100%; padding: 0.75rem; border: 1px solid var(--border); border-radius: 0.5rem; box-sizing: border-box; font-size: 1rem; }
        .btn-submit { width: 100%; padding: 1rem; background: var(--primary); color: white; border: none; border-radius: 0.5rem; font-weight: 700; cursor: pointer; margin-top: 1rem; transition: 0.2s; }
        .btn-submit:hover { background: var(--primary-hover); }
        #successModal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); align-items: center; justify-content: center; z-index: 100; }
        .modal-content { background: white; padding: 2rem; border-radius: 1rem; text-align: center; }
    </style>
</head>
<body>

    <div class="form-card">
        <div class="header-section">
            <h1 style="margin:0; font-size: 1.75rem;">Register Business</h1>
            <p style="color: var(--text-muted);">Join skipQs to manage your lines.</p>
        </div>

        <form id="providerSignupForm">
            <div class="form-group">
                <label class="form-label">Business Name</label>
                <input type="text" id="businessName" class="form-control" placeholder="e.g. Honey2" required>
            </div>

            <div class="form-group">
                <label class="form-label">Service Type</label>
                <select id="serviceType" class="form-control" required>
                    <option value="salon">Salon & Spa</option>
                    <option value="restaurant">Restaurant</option>
                    <option value="clinic">Clinic</option>
                </select>
            </div>

            <div class="form-group">
                <label class="form-label">Business Address</label>
                <input type="text" id="address" class="form-control" placeholder="Type your full address" required>
            </div>

            <div class="form-group">
                <label class="form-label">Work Email</label>
                <input type="email" id="email" class="form-control" required>
            </div>

            <div class="form-group">
                <label class="form-label">Password</label>
                <input type="password" id="password" class="form-control" required minlength="6">
            </div>

            <div class="form-group">
                <label class="form-label">Typical Wait (Mins)</label>
                <input type="number" id="avgWait" class="form-control" value="15" required>
            </div>

            <button type="submit" id="submitBtn" class="btn-submit">Create Business Account</button>
        </form>
    </div>

    <div id="successModal">
        <div class="modal-content">
            <h2>Success!</h2>
            <p>Your business has been registered.</p>
            <button class="btn-submit" onclick="window.location.replace('provider-dashboard.html')">Go to Dashboard</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="firebase-config.js"></script>

    <script>
        document.getElementById('providerSignupForm').onsubmit = async (e) => {
            e.preventDefault();
            const submitBtn = document.getElementById('submitBtn');
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            submitBtn.disabled = true;
            submitBtn.innerText = "Registering...";

            try {
                // 1. Create Auth Account
                const cred = await firebase.auth().createUserWithEmailAndPassword(email, password);
                
                // 2. Create Firestore Entry
                await firebase.firestore().collection('providers').doc(cred.user.uid).set({
                    businessName: document.getElementById('businessName').value,
                    type: document.getElementById('serviceType').value,
                    avgWait: parseInt(document.getElementById('avgWait').value),
                    email: email,
                    role: 'provider',
                    location: {
                        address: document.getElementById('address').value,
                        lat: 0,
                        lng: 0
                    },
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });

                document.getElementById('successModal').style.display = 'flex';
            } catch (err) {
                submitBtn.disabled = false;
                submitBtn.innerText = "Create Business Account";
                alert("Error: " + err.message);
            }
        };
    </script>
</body>
</html>
