<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Business Registration | skipQs</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --bg-light: #f8fafc;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border: #e2e8f0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-light);
            color: var(--text-main);
            margin: 0;
            line-height: 1.5;
        }

        .signup-container {
            max-width: 500px;
            margin: 4rem auto;
            padding: 0 1.5rem;
        }

        .form-card {
            background: white;
            padding: 2.5rem;
            border-radius: 1rem;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
        }

        .header-section {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .badge {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            background: #dbeafe;
            color: var(--primary);
            font-weight: 600;
            font-size: 0.875rem;
            border-radius: 9999px;
            margin-bottom: 1rem;
        }

        h1 {
            font-size: 1.875rem;
            font-weight: 800;
            margin: 0 0 0.5rem 0;
            letter-spacing: -0.025em;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        .form-group {
            margin-bottom: 1.25rem;
        }

        .form-label {
            display: block;
            font-weight: 600;
            font-size: 0.875rem;
            margin-bottom: 0.5rem;
        }

        .form-control {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid var(--border);
            border-radius: 0.5rem;
            font-size: 0.95rem;
            box-sizing: border-box;
            transition: border-color 0.2s, ring 0.2s;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        .btn-submit {
            width: 100%;
            padding: 0.875rem;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 0.5rem;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 1.5rem;
            transition: background 0.2s;
        }

        .btn-submit:hover { background: var(--primary-hover); }
        .btn-submit:disabled { background: #94a3b8; cursor: not-allowed; }

        .footer-text {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.875rem;
            color: var(--text-muted);
        }

        .footer-text a { color: var(--primary); font-weight: 700; text-decoration: none; }

        /* Google Maps Autocomplete Styling */
        .pac-container {
            border-radius: 0.5rem;
            margin-top: 4px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            border: 1px solid var(--border);
            font-family: 'Inter', sans-serif;
            z-index: 10000 !important;
        }

        /* Success Modal Overlay */
        #successModal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.7);
            z-index: 9999;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(4px);
        }

        .modal-content {
            background: white;
            padding: 3rem;
            border-radius: 1rem;
            text-align: center;
            max-width: 400px;
            width: 90%;
        }

        .success-check {
            width: 60px;
            height: 60px;
            background: #dcfce7;
            color: #15803d;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            margin: 0 auto 1.5rem;
        }
    </style>
</head>
<body>

    <div class="signup-container">
        <div class="form-card">
            <div class="header-section">
                <span class="badge">Partner with us</span>
                <h1>Register Your Business</h1>
                <p class="subtitle">Join our platform and start eliminating lines.</p>
            </div>

            <form id="providerSignupForm">
                <div class="form-group">
                    <label class="form-label">Business Name</label>
                    <input type="text" id="businessName" class="form-control" placeholder="e.g. Urban Cuts Salon" required>
                </div>

                <div class="form-group">
                    <label class="form-label">Service Type</label>
                    <select id="serviceType" class="form-control" required>
                        <option value="salon">Salon & Spa</option>
                        <option value="restaurant">Restaurant / Cafe</option>
                        <option value="clinic">Health Clinic</option>
                        <option value="other">Other Service</option>
                    </select>
                </div>

                <div class="form-group">
                    <label class="form-label">Business Address</label>
                    <input type="text" id="addressLookup" class="form-control" placeholder="Search for your address..." required>
                    <input type="hidden" id="placeId">
                    <input type="hidden" id="lat">
                    <input type="hidden" id="lng">
                    <input type="hidden" id="formattedAddress">
                </div>

                <div class="form-group">
                    <label class="form-label">Work Email</label>
                    <input type="email" id="email" class="form-control" placeholder="name@business.com" required>
                </div>

                <div class="form-group">
                    <label class="form-label">Password</label>
                    <input type="password" id="password" class="form-control" placeholder="Min. 6 characters" required minlength="6">
                </div>

                <div class="form-group">
                    <label class="form-label">Avg. Wait Time (Minutes)</label>
                    <input type="number" id="avgWait" class="form-control" placeholder="e.手 15" required min="1">
                </div>

                <button type="submit" id="submitBtn" class="btn-submit">Create Business Account</button>
            </form>

            <p class="footer-text">
                Already have an account? <a href="login.html">Log in here</a>
            </p>
        </div>
    </div>

    <div id="successModal">
        <div class="modal-content">
            <div class="success-check">✓</div>
            <h2>Registration Successful!</h2>
            <p class="subtitle" style="margin-bottom: 2rem;">Your business profile has been created.</p>
            <button class="btn-submit" onclick="window.location.replace('provider-dashboard.html')">Enter Dashboard</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    
    <script src="firebase-config.js"></script>

    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAJFGE5OFfn-OhDNJ_rWO5oi2d2CHl2fXE&libraries=places"></script>

    <script>
        // Fix for Google Maps Lookup
        let autocomplete;
        function initAutocomplete() {
            const input = document.getElementById('addressLookup');
            // Ensure input exists and Google is loaded
            if (!input || !google.maps.places) return;

            autocomplete = new google.maps.places.Autocomplete(input, {
                types: ['address', 'establishment'],
                fields: ['place_id', 'geometry', 'formatted_address']
            });

            autocomplete.addListener("place_changed", () => {
                const place = autocomplete.getPlace();
                if (!place.geometry) {
                    alert("Please select a valid address from the dropdown list.");
                    return;
                }
                document.getElementById('placeId').value = place.place_id;
                document.getElementById('lat').value = place.geometry.location.lat();
                document.getElementById('lng').value = place.geometry.location.lng();
                document.getElementById('formattedAddress').value = place.formatted_address;
            });
        }

        // Initialize autocomplete when window loads
        window.onload = initAutocomplete;

        // Signup Logic
        document.getElementById('providerSignupForm').onsubmit = async (e) => {
            e.preventDefault();
            const submitBtn = document.getElementById('submitBtn');
            const placeId = document.getElementById('placeId').value;

            if (!placeId) {
                alert('Please select an address from the dropdown to confirm your location.');
                return;
            }

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            const providerData = {
                businessName: document.getElementById('businessName').value,
                type: document.getElementById('serviceType').value,
                avgWait: parseInt(document.getElementById('avgWait').value),
                email: email,
                role: 'provider',
                isOpen: true,
                location: {
                    placeId: placeId,
                    lat: parseFloat(document.getElementById('lat').value),
                    lng: parseFloat(document.getElementById('lng').value),
                    address: document.getElementById('formattedAddress').value
                },
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            };

            try {
                submitBtn.disabled = true;
                submitBtn.innerText = 'Creating profile...';

                // 1. Auth Account Creation
                const cred = await firebase.auth().createUserWithEmailAndPassword(email, password);
                
                // 2. Database Record Creation
                await firebase.firestore().collection('providers').doc(cred.user.uid).set(providerData);
                
                // 3. Success UI
                document.getElementById('successModal').style.display = 'flex';

            } catch (err) {
                submitBtn.disabled = false;
                submitBtn.innerText = 'Create Business Account';
                console.error("Signup failed:", err);
                alert("Registration Error: " + err.message);
            }
        };
    </script>
</body>
</html>
