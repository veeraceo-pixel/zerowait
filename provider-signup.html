<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Business Registration | skipQs</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #2563eb; --primary-hover: #1d4ed8; --bg-light: #f8fafc; --text-main: #1e293b; --text-muted: #64748b; --border: #e2e8f0; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg-light); color: var(--text-main); margin: 0; line-height: 1.5; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .form-card { background: white; padding: 2.5rem; border-radius: 1rem; box-shadow: 0 10px 25px rgba(0,0,0,0.05); width: 100%; max-width: 450px; }
        .header-section { text-align: center; margin-bottom: 2rem; }
        .form-group { margin-bottom: 1.25rem; }
        .form-label { display: block; font-weight: 600; font-size: 0.875rem; margin-bottom: 0.5rem; }
        .form-control { width: 100%; padding: 0.75rem; border: 1px solid var(--border); border-radius: 0.5rem; box-sizing: border-box; font-size: 1rem; }
        .btn-submit { width: 100%; padding: 1rem; background: var(--primary); color: white; border: none; border-radius: 0.5rem; font-weight: 700; cursor: pointer; margin-top: 1rem; transition: 0.2s; }
        .btn-submit:hover { background: var(--primary-hover); }
        .btn-submit:disabled { opacity: 0.7; cursor: not-allowed; }

        /* Success Modal Overlay */
        #successModal { display: none; position: fixed; inset: 0; background: rgba(15, 23, 42, 0.9); align-items: center; justify-content: center; z-index: 9999; backdrop-filter: blur(4px); }
        .modal-content { background: white; padding: 3rem; border-radius: 1.5rem; text-align: center; width: 90%; max-width: 400px; }
        .success-icon { width: 64px; height: 64px; background: #dcfce7; color: #166534; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 2rem; margin: 0 auto 1.5rem; }
    </style>
</head>
<body>

    <div class="form-card">
        <div class="header-section">
            <h1 style="margin:0; font-size: 1.75rem;">Register Business</h1>
            <p style="color: var(--text-muted);">Create your partner account below.</p>
        </div>

        <form id="providerSignupForm">
            <div class="form-group">
                <label class="form-label">Business Name</label>
                <input type="text" id="businessName" class="form-control" placeholder="e.g. Honey2" required>
            </div>
            <div class="form-group">
                <label class="form-label">Service Type</label>
                <select id="serviceType" class="form-control" required>
                    <option value="salon">Salon & Spa</option>
                    <option value="restaurant">Restaurant</option>
                    <option value="clinic">Clinic</option>
                </select>
            </div>
            <div class="form-group">
                <label class="form-label">Business Address</label>
                <input type="text" id="address" class="form-control" placeholder="Full Address" required>
            </div>
            <div class="form-group">
                <label class="form-label">Work Email</label>
                <input type="email" id="email" class="form-control" required>
            </div>
            <div class="form-group">
                <label class="form-label">Password</label>
                <input type="password" id="password" class="form-control" required minlength="6">
            </div>
            <div class="form-group" style="display:none;">
                <input type="number" id="avgWait" value="15">
            </div>

            <button type="submit" id="submitBtn" class="btn-submit">Create Business Account</button>
        </form>
    </div>

    <div id="successModal">
        <div class="modal-content">
            <div class="success-icon">✓</div>
            <h2>Success!</h2>
            <p style="color: var(--text-muted); margin-bottom: 2rem;">Your account is ready. Please log in to continue.</p>
            <button class="btn-submit" onclick="window.location.href='login.html'">Go to Login</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="firebase-config.js"></script>

    <script>
        const signupForm = document.getElementById('providerSignupForm');
        const submitBtn = document.getElementById('submitBtn');
        const modal = document.getElementById('successModal');

        signupForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            // 1. UI Feedback
            submitBtn.disabled = true;
            submitBtn.innerText = "Registering...";

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const bName = document.getElementById('businessName').value;
            const bAddress = document.getElementById('address').value;
            const bType = document.getElementById('serviceType').value;

            try {
                console.log("Starting Firebase Auth...");
                // 2. Create Auth User
                const userCredential = await firebase.auth().createUserWithEmailAndPassword(email, password);
                const user = userCredential.user;
                console.log("Auth success! UID:", user.uid);

                // 3. Create Firestore Entry
                console.log("Starting Firestore write...");
                await firebase.firestore().collection('providers').doc(user.uid).set({
                    businessName: bName,
                    type: bType,
                    email: email,
                    role: 'provider',
                    location: { address: bAddress, lat: 0, lng: 0 },
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });
                console.log("Firestore success!");

                // 4. Show Success UI
                modal.style.display = 'flex';
                
            } catch (error) {
                console.error("Signup failed error code:", error.code);
                console.error("Signup failed message:", error.message);
                
                // Reset button so user isn't stuck
                submitBtn.disabled = false;
                submitBtn.innerText = "Create Business Account";
                
                alert("Signup Failed: " + error.message);
            }
        });
    </script>
</body>
</html>
