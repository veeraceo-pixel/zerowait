<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Business Registration | skipQs</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #2563eb; --primary-hover: #1d4ed8; --bg-light: #f8fafc; --text-main: #1e293b; --text-muted: #64748b; --border: #e2e8f0; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg-light); color: var(--text-main); margin: 0; line-height: 1.5; }
        .signup-container { max-width: 500px; margin: 4rem auto; padding: 0 1.5rem; }
        .form-card { background: white; padding: 2.5rem; border-radius: 1rem; box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1); }
        .header-section { text-align: center; margin-bottom: 2.5rem; }
        .badge { display: inline-block; padding: 0.25rem 0.75rem; background: #dbeafe; color: var(--primary); font-weight: 600; font-size: 0.875rem; border-radius: 9999px; margin-bottom: 1rem; }
        h1 { font-size: 1.875rem; font-weight: 800; margin: 0; letter-spacing: -0.025em; }
        .form-group { margin-bottom: 1.25rem; }
        .form-label { display: block; font-weight: 600; font-size: 0.875rem; margin-bottom: 0.5rem; }
        .form-control { width: 100%; padding: 0.75rem; border: 1px solid var(--border); border-radius: 0.5rem; font-size: 0.95rem; box-sizing: border-box; }
        .btn-submit { width: 100%; padding: 0.875rem; background: var(--primary); color: white; border: none; border-radius: 0.5rem; font-weight: 700; font-size: 1rem; cursor: pointer; margin-top: 1.5rem; }
        
        /* CRITICAL FIX FOR ADDRESS DROPDOWN */
        .pac-container { 
            z-index: 99999 !important; 
            border-radius: 8px; 
            border: 1px solid #e2e8f0; 
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            font-family: 'Inter', sans-serif;
        }

        #successModal { display: none; position: fixed; inset: 0; background: rgba(15, 23, 42, 0.7); z-index: 9999; align-items: center; justify-content: center; backdrop-filter: blur(4px); }
        .modal-content { background: white; padding: 3rem; border-radius: 1rem; text-align: center; max-width: 400px; width: 90%; }
    </style>
</head>
<body>

    <div class="signup-container">
        <div class="form-card">
            <div class="header-section">
                <span class="badge">Partner with us</span>
                <h1>Register Your Business</h1>
            </div>

            <form id="providerSignupForm">
                <div class="form-group">
                    <label class="form-label">Business Name</label>
                    <input type="text" id="businessName" class="form-control" placeholder="e.g. Urban Cuts Salon" required>
                </div>

                <div class="form-group">
                    <label class="form-label">Service Type</label>
                    <select id="serviceType" class="form-control" required>
                        <option value="salon">Salon & Spa</option>
                        <option value="restaurant">Restaurant / Cafe</option>
                        <option value="clinic">Health Clinic</option>
                        <option value="other">Other Service</option>
                    </select>
                </div>

                <div class="form-group">
                    <label class="form-label">Business Address</label>
                    <input type="text" id="addressLookup" class="form-control" placeholder="Search your address..." autocomplete="off" required>
                    <input type="hidden" id="placeId">
                    <input type="hidden" id="lat">
                    <input type="hidden" id="lng">
                    <input type="hidden" id="formattedAddress">
                </div>

                <div class="form-group">
                    <label class="form-label">Work Email</label>
                    <input type="email" id="email" class="form-control" placeholder="name@business.com" required>
                </div>

                <div class="form-group">
                    <label class="form-label">Password</label>
                    <input type="password" id="password" class="form-control" placeholder="Min. 6 characters" required minlength="6">
                </div>

                <div class="form-group">
                    <label class="form-label">Avg. Wait Time (Minutes)</label>
                    <input type="number" id="avgWait" class="form-control" required min="1">
                </div>

                <button type="submit" id="submitBtn" class="btn-submit">Create Business Account</button>
            </form>
        </div>
    </div>

    <div id="successModal">
        <div class="modal-content">
            <h2>Success!</h2>
            <button class="btn-submit" onclick="window.location.replace('provider-dashboard.html')">Go to Dashboard</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="firebase-config.js"></script>
    
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAJFGE5OFfn-OhDNJ_rWO5oi2d2CHl2fXE&libraries=places"></script>

    <script>
        let autocomplete;
        function initAutocomplete() {
            const input = document.getElementById('addressLookup');
            autocomplete = new google.maps.places.Autocomplete(input, {
                types: ['address', 'establishment'],
                fields: ['place_id', 'geometry', 'formatted_address']
            });

            autocomplete.addListener("place_changed", () => {
                const place = autocomplete.getPlace();
                if (!place.geometry) return;
                
                document.getElementById('placeId').value = place.place_id;
                document.getElementById('lat').value = place.geometry.location.lat();
                document.getElementById('lng').value = place.geometry.location.lng();
                document.getElementById('formattedAddress').value = place.formatted_address;
            });
        }
        window.onload = initAutocomplete;

        document.getElementById('providerSignupForm').onsubmit = async (e) => {
            e.preventDefault();
            const placeId = document.getElementById('placeId').value;
            if (!placeId) {
                alert('Please select an address from the dropdown to confirm your location.');
                return;
            }

            try {
                const email = document.getElementById('email').value;
                const password = document.getElementById('password').value;
                const cred = await firebase.auth().createUserWithEmailAndPassword(email, password);
                
                await firebase.firestore().collection('providers').doc(cred.user.uid).set({
                    businessName: document.getElementById('businessName').value,
                    type: document.getElementById('serviceType').value,
                    avgWait: parseInt(document.getElementById('avgWait').value),
                    email: email,
                    role: 'provider',
                    location: {
                        placeId: placeId,
                        lat: parseFloat(document.getElementById('lat').value),
                        lng: parseFloat(document.getElementById('lng').value),
                        address: document.getElementById('formattedAddress').value
                    },
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });
                document.getElementById('successModal').style.display = 'flex';
            } catch (err) {
                alert(err.message);
            }
        };
    </script>
</body>
</html>
