<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Business Registration - ZeroWait</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">
    <nav class="navbar">
        <div class="container nav-content">
            <a href="index.html" class="logo">ZeroWait</a>
            <div class="nav-links">
                <a href="index.html">Home</a>
                <a href="login.html" class="btn btn-outline">Login</a>
            </div>
        </div>
    </nav>

    <main class="py-5">
        <div class="container" style="max-width: 600px;">
            <div class="card p-4 shadow-sm">
                <h2 class="h4 font-weight-bold mb-3">Register Your Business</h2>
                <p class="text-secondary small mb-4">Enroll your business to start managing your virtual queue today.</p>

                <form id="providerSignupForm">
                    <div class="form-group">
                        <label class="form-label">Search on Google Maps (Optional)</label>
                        <input type="text" id="mapSearch" class="form-control" placeholder="Search your business name or address..." />
                        <p class="small text-secondary mt-2">Linking your Google Maps profile helps users find you and estimate travel time.</p>
                    </div>

                    <hr class="mb-4" style="opacity: 0.1;">

                    <div class="row">
                        <div class="col-md-4 mb-3" style="flex: 0 0 100%; max-width: 100%;">
                            <label class="form-label">Business Name</label>
                            <input type="text" id="businessName" class="form-control" placeholder="Business name" required />
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Business Address</label>
                        <input type="text" id="address" class="form-control" placeholder="Street address, City, State" required />
                    </div>

                    <div class="form-group">
                        <label class="form-label">Business Email</label>
                        <input type="email" id="email" class="form-control" placeholder="name@business.com" required />
                    </div>

                    <div class="form-group">
                        <label class="form-label">Password</label>
                        <input type="password" id="password" class="form-control" placeholder="Min 6 characters" minlength="6" required />
                    </div>

                    <button type="submit" id="signupBtn" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Create Business Account</button>
                </form>

                <p class="mt-4 text-center small text-secondary">
                    Already have an account? <a href="login.html" style="color: var(--primary); font-weight: 600; text-decoration: none;">Log In</a>
                </p>
            </div>
        </div>
    </main>

    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAG-Qv4aH4xE2VFAMImB_xwG4J8TmehUMQ&libraries=places"></script>
    <script>
        // Google Places Autocomplete
        function initAutocomplete() {
            const input = document.getElementById('mapSearch');
            const autocomplete = new google.maps.places.Autocomplete(input);
            
            autocomplete.addListener('place_changed', () => {
                const place = autocomplete.getPlace();
                if (!place.geometry) return;
                
                document.getElementById('businessName').value = place.name || "";
                document.getElementById('address').value = place.formatted_address || "";
                // Store place_id for better integration
                window.selectedPlaceId = place.place_id;
            });
        }
        window.onload = initAutocomplete;

        // Firebase Logic
        document.getElementById('providerSignupForm').onsubmit = async (e) => {
            e.preventDefault();
            // (Auth and Firestore logic preserved and enhanced with selectedPlaceId)
        };
    </script>
</body>
</html>
