<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Provider Signup – ZeroWait</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  font-family: Arial, sans-serif;
  background: #f5f7fb;
  margin: 0;
}
header {
  padding: 15px 30px;
  background: #2563eb;
  color: white;
}
#map {
  height: 50vh;
}
.list {
  padding: 20px;
}
.card {
  background: white;
  padding: 15px;
  border-radius: 10px;
  margin-bottom: 12px;
  cursor: pointer;
}
</style>
</head>

<body>

<header>Register Your Business</header>
<div id="map"></div>
<div class="list" id="list">Loading nearby businesses...</div>

<script>
let map, service;
let providers = JSON.parse(localStorage.getItem("providers")) || [];

function initMap() {
  navigator.geolocation.getCurrentPosition(pos => {
    const loc = { lat: pos.coords.latitude, lng: pos.coords.longitude };

    map = new google.maps.Map(document.getElementById("map"), {
      center: loc,
      zoom: 14
    });

    service = new google.maps.places.PlacesService(map);
    service.nearbySearch(
      { location: loc, radius: 3000, type: "beauty_salon" },
      render
    );
  });
}

function render(results, status) {
  if (status !== google.maps.places.PlacesServiceStatus.OK) return;

  const list = document.getElementById("list");
  list.innerHTML = "";

  results.slice(0, 10).forEach(p => {
    const div = document.createElement("div");
    div.className = "card";
    div.innerHTML = `<strong>${p.name}</strong><br>${p.vicinity || ""}`;

    div.onclick = () => {
      providers.push({
        placeId: p.place_id,
        name: p.name,
        type: "salon",
        avgTime: 10,
        queue: []
      });
      localStorage.setItem("providers", JSON.stringify(providers));
      localStorage.setItem("activeProvider", p.place_id);
      window.location.href = "provider-dashboard.html";
    };

    list.appendChild(div);
  });
}
</script>

<script async
src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAG-Qv4aH4xE2VFAMImB_xwG4J8TmehUMQ&libraries=places&callback=initMap">
</script>

</body>
</html>
