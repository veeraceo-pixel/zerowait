<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Provider Signup – ZeroWait</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f5f7fb;
}

header {
  padding: 15px 40px;
  background: #fff;
  border-bottom: 1px solid #ddd;
}

.logo {
  font-size: 22px;
  font-weight: bold;
  color: #2563eb;
}

.container {
  max-width: 500px;
  margin: 40px auto;
  background: white;
  padding: 30px;
  border-radius: 12px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.05);
}

label {
  display: block;
  margin-top: 15px;
  font-weight: bold;
}

input, select {
  width: 100%;
  padding: 10px;
  margin-top: 6px;
  border-radius: 6px;
  border: 1px solid #ccc;
}

button {
  margin-top: 25px;
  width: 100%;
  padding: 12px;
  background: #2563eb;
  color: white;
  border: none;
  border-radius: 8px;
  font-size: 16px;
  cursor: pointer;
}

button:disabled {
  background: #9ca3af;
}
</style>
</head>

<body>

<header>
  <div class="logo">ZeroWait – Provider</div>
</header>

<div class="container" id="formBox">
  <h2>Register Your Business</h2>

  <label>Business Name</label>
  <input id="businessName" />

  <label>Service Type</label>
  <select id="serviceType">
    <option value="">Select</option>
    <option value="salon">Salon</option>
    <option value="restaurant">Restaurant</option>
    <option value="clinic">Clinic</option>
  </select>

  <label>Average Service Time (minutes)</label>
  <input type="number" id="avgTime" />

  <label>Email</label>
  <input type="email" id="email" />

  <label>Password</label>
  <input type="password" id="password" />

  <button id="signupBtn" type="button">Create Provider Account</button>
</div>

<!-- Firebase SDKs -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>
/* ======================
   FIREBASE INIT
====================== */
firebase.initializeApp({
  apiKey: "AIzaSyAJFGE5OFfn-OhDNJ_rWO5oi2d2CHl2fXE",
  authDomain: "zerowait-c21fc.firebaseapp.com",
  projectId: "zerowait-c21fc",
  storageBucket: "zerowait-c21fc.firebasestorage.app",
  messagingSenderId: "839269113134",
  appId: "1:839269113134:web:0411874b0e248a2a102ebf"
});

const auth = firebase.auth();
const db = firebase.firestore();

/* ======================
   SIGNUP HANDLER
====================== */
document.getElementById("signupBtn").addEventListener("click", async () => {
  const btn = document.getElementById("signupBtn");

  const name = document.getElementById("businessName").value.trim();
  const type = document.getElementById("serviceType").value;
  const avgTime = document.getElementById("avgTime").value;
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value;

  if (!name || !type || !avgTime || !email || !password) {
    alert("Please fill all fields");
    return;
  }

  btn.disabled = true;
  btn.innerText = "Creating account...";

  try {
    const cred = await auth.createUserWithEmailAndPassword(email, password);

    await db.collection("providers").doc(cred.user.uid).set({
      name: name,
      serviceType: type,
      avgServiceTime: Number(avgTime),
      isOpen: true,
      createdAt: firebase.firestore.FieldValue.serverTimestamp()
    });

    document.getElementById("formBox").innerHTML = `
      <h2>✅ Signup Successful</h2>
      <p>Your provider account is ready.</p>
      <p>Redirecting to dashboard...</p>
    `;

    setTimeout(() => {
      window.location.href = "provider-dashboard.html";
    }, 1500);

  } catch (err) {
    alert(err.message);
    btn.disabled = false;
    btn.innerText = "Create Provider Account";
  }
});
</script>

</body>
</html>
