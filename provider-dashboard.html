<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Provider Dashboard – ZeroWait</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  font-family: Arial, sans-serif;
  background: #f5f7fb;
}
.container {
  max-width: 600px;
  margin: 40px auto;
}
.card {
  background: white;
  padding: 20px;
  border-radius: 10px;
  margin-bottom: 20px;
}
button {
  background: #2563eb;
  color: white;
  border: none;
  padding: 8px 12px;
  border-radius: 6px;
}
</style>
</head>

<body>

<div class="container">
  <h2 id="title"></h2>

  <div class="card">
    <label>Avg Service Time (mins)</label>
    <input type="number" id="avgTime">
  </div>

  <div class="card">
    <button onclick="add()">➕ Add Customer</button>
    <div id="queue"></div>
  </div>

  <div class="card">
    <strong>Waiting Time:</strong>
    <span id="wait"></span>
  </div>
</div>

<script>
const providers = JSON.parse(localStorage.getItem("providers")) || [];
const id = localStorage.getItem("activeProvider");
const provider = providers.find(p => p.placeId === id);

document.getElementById("title").innerText = provider.name;
const avgInput = document.getElementById("avgTime");
avgInput.value = provider.avgTime;

function save() {
  localStorage.setItem("providers", JSON.stringify(providers));
  render();
}

avgInput.oninput = () => {
  provider.avgTime = Number(avgInput.value);
  save();
};

function add() {
  provider.queue.push(Date.now());
  save();
}

function remove(i) {
  provider.queue.splice(i, 1);
  save();
}

function render() {
  const q = document.getElementById("queue");
  q.innerHTML = "";
  provider.queue.forEach((_, i) => {
    q.innerHTML += `
      <div>Customer ${i + 1}
      <button onclick="remove(${i})">Done</button></div>
    `;
  });
  document.getElementById("wait").innerText =
    provider.queue.length * provider.avgTime + " mins";
}

render();
</script>

</body>
</html>
