<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Provider Dashboard - ZeroWait</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <style>
        .dashboard-grid { display: grid; grid-template-columns: 300px 1fr; gap: 2rem; min-height: calc(100vh - 150px); }
        .stats-card { padding: 1.5rem; background: var(--bg-white); border-radius: var(--radius-lg); border: 1px solid var(--border); text-align: center; }
        .queue-list { background: var(--bg-white); border-radius: var(--radius-lg); border: 1px solid var(--border); overflow: hidden; }
        .queue-header { padding: 1.5rem; border-bottom: 1px solid var(--border); background: #fcfcfd; display: flex; justify-content: space-between; align-items: center; }
        .queue-item { padding: 1.25rem 1.5rem; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; transition: background 0.2s; }
        .queue-item:hover { background: #f9fafb; }
        .queue-item.serving { background: #f0f7ff; border-left: 4px solid var(--primary); }
        .badge-serving { background: #e0f2fe; color: #0369a1; padding: 0.25rem 0.75rem; border-radius: 9999px; font-size: 0.75rem; font-weight: 600; }
        .sidebar { display: flex; flex-direction: column; gap: 1rem; }
        @media (max-width: 992px) { .dashboard-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body class="bg-light" onload="init()">
    <nav class="navbar">
        <div class="container nav-content">
            <a href="index.html" class="logo">ZeroWait</a>
            <div class="nav-links">
                <span id="businessName" class="font-weight-bold mr-3"></span>
                <button onclick="logout()" class="btn btn-outline">Logout</button>
            </div>
        </div>
    </nav>
    <main class="container py-5">
        <div class="dashboard-grid">
            <aside class="sidebar">
                <div class="stats-card shadow-sm">
                    <div class="text-secondary small font-weight-bold text-uppercase mb-1">In Queue</div>
                    <div id="queueCount" class="h1 font-weight-extrabold text-primary mb-0">0</div>
                </div>
                <div class="stats-card shadow-sm">
                    <div class="text-secondary small font-weight-bold text-uppercase mb-1">Avg. Wait</div>
                    <div id="displayAvgWait" class="h2 font-weight-bold mb-0">--</div>
                    <div class="small text-muted">minutes</div>
                </div>
                <div class="card p-4 shadow-sm">
                    <h3 class="h6 font-weight-bold mb-3">Quick Actions</h3>
                    <button onclick="toggleStoreStatus()" id="statusBtn" class="btn btn-primary mb-2" style="width: 100%;">Close Entry</button>
                    <button onclick="showQRCode()" class="btn btn-outline" style="width: 100%;">View QR Code</button>
                </div>
            </aside>
            <section class="main-content">
                <div class="queue-list shadow-sm">
                    <div class="queue-header">
                        <h2 class="h5 font-weight-bold mb-0">Active Queue</h2>
                        <div class="small text-secondary">Real-time updates</div>
                    </div>
                    <div id="queueItems">
                        <div class="text-center py-5 text-muted">
                            <p>No customers in line.</p>
                        </div>
                    </div>
                </div>
            </section>
        </div>
    </main>
    <div id="qrModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:2000; align-items:center; justify-content:center;">
        <div class="card p-5 text-center" style="max-width: 400px; width: 90%;">
            <h3 class="h4 font-weight-bold mb-4">Store QR Code</h3>
            <div id="qrcode" class="mb-4" style="background:#fff; padding: 10px; display:flex; align-items:center; justify-content:center; border-radius:1rem; border: 1px solid #ddd; min-height: 200px;"></div>
            <p class="small text-secondary mb-4">Print this and display it at your entrance for customers to scan.</p>
            <button onclick="document.getElementById('qrModal').style.display='none'" class="btn btn-primary" style="width:100%">Close</button>
        </div>
    </div>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="firebase-config.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script>
        let db, currentProviderId;
        function init() {
            db = firebase.firestore();
            firebase.auth().onAuthStateChanged(user => {
                if (!user) { window.location.href = 'login.html'; return; }
                currentProviderId = user.uid;
                loadProviderData(); listenToQueue();
            });
        }
        async function loadProviderData() {
            const doc = await db.collection('providers').doc(currentProviderId).get();
            if (doc.exists) {
                const data = doc.data();
                document.getElementById('businessName').innerText = data.businessName;
                document.getElementById('displayAvgWait').innerText = data.avgWait || 15;
                const statusBtn = document.getElementById('statusBtn');
                if (data.isOpen === false) { statusBtn.innerText = 'Open Entry'; statusBtn.className = 'btn btn-outline-success mb-2'; }
            }
        }
        function listenToQueue() {
            db.collection('queues').where('providerId', '==', currentProviderId).where('status', 'in', ['waiting', 'serving']).orderBy('joinedAt', 'asc').onSnapshot(snapshot => {
                const itemsContainer = document.getElementById('queueItems');
                const countDisplay = document.getElementById('queueCount');
                const customers = snapshot.docs.map(doc => ({id: doc.id, ...doc.data()}));
                countDisplay.innerText = customers.filter(c => c.status === 'waiting').length;
                if (customers.length === 0) { itemsContainer.innerHTML = '<div class="text-center py-5 text-muted"><p>No customers in line.</p></div>'; return; }
                itemsContainer.innerHTML = customers.map((c, index) => `
                    <div class="queue-item ${c.status === 'serving' ? 'serving' : ''}">
                        <div><div class="font-weight-bold">${c.customerName}</div><div class="small text-secondary">${c.customerPhone || 'No phone'}</div>
                        ${c.status === 'serving' ? '<span class="badge-serving mt-1">Being Served</span>' : ''}</div>
                        <div class="actions">
                        ${c.status === 'waiting' ? `<button onclick="serveCustomer('${c.id}')" class="btn btn-sm btn-primary">Serve</button>` : `<button onclick="completeCustomer('${c.id}')" class="btn btn-sm btn-success">Complete</button>`}
                        </div>
                    </div>`).join('');
            });
        }
        async function serveCustomer(id) {
            const serving = await db.collection('queues').where('providerId', '==', currentProviderId).where('status', '==', 'serving').get();
            const batch = db.batch();
            serving.forEach(doc => { batch.update(doc.ref, { status: 'completed', completedAt: firebase.firestore.FieldValue.serverTimestamp() }); });
            batch.update(db.collection('queues').doc(id), { status: 'serving', servingStartTime: firebase.firestore.FieldValue.serverTimestamp() });
            await batch.commit();
        }
        async function completeCustomer(id) { await db.collection('queues').doc(id).update({ status: 'completed', completedAt: firebase.firestore.FieldValue.serverTimestamp() }); }
        async function toggleStoreStatus() {
            const docRef = db.collection('providers').doc(currentProviderId);
            const doc = await docRef.get();
            const isOpen = doc.data().isOpen !== false;
            await docRef.update({ isOpen: !isOpen }); loadProviderData();
        }
        function showQRCode() {
            const qrContainer = document.getElementById('qrcode');
            qrContainer.innerHTML = '';
            const baseUrl = window.location.origin + window.location.pathname.split('/').slice(0, -1).join('/');
            const joinUrl = baseUrl + '/join-queue.html?provider=' + currentProviderId;
            new QRCode(qrContainer, { text: joinUrl, width: 200, height: 200 });
            document.getElementById('qrModal').style.display = 'flex';
        }
        function logout() { firebase.auth().signOut().then(() => { window.location.href = 'login.html'; }); }
    </script>
</body>
</html>
