<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Business Dashboard | ZeroWait</title>
    <link rel="stylesheet" href="style.css">
    <style>
        #dashboardContent { display: block !important; }
        .qr-modal { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); display: none; align-items: center; justify-content: center; z-index: 1000; }
        .qr-modal.active { display: flex; }
        .qr-modal-content { background: white; padding: 2rem; border-radius: 8px; text-align: center; }
    </style>
</head>
<body class="bg-light">
    <header class="navbar">
        <div class="container nav-content">
            <a href="index.html" class="logo">ZeroWait</a>
            <nav class="nav-links">
                <span id="businessName" class="font-weight-bold">My Business</span>
                <button onclick="logout()" class="btn btn-primary">Logout</button>
            </nav>
        </div>
    </header>
    <main class="container py-5">
        <div id="dashboardContent" style="display: block;">
            <h1>Welcome to Your Business Dashboard</h1>
            <div class="dashboard-grid">
                <div class="sidebar-section">
                    <div class="card">
                        <h3>Queue Status</h3>
                        <p id="queueStatus">Loading...</p>
                    </div>
                </div>
                <div class="main-content">
                    <div class="stats-card">
                        <div class="value" id="queueCount">0</div>
                        <div class="label">Customers in Queue</div>
                    </div>
                    <div class="queue-list" id="queueList">
                        <div class="queue-header">
                            <h2 class="h5 mb-0">Active Queue</h2>
                            <button id="toggleStoreStatus" class="btn btn-primary btn-sm">Status Controls</button>
                        </div>
                        <div id="queueItems" class="queue-items">No customers in queue</div>
                    </div>
                    <button id="displayQRBtn" class="btn btn-primary" style="margin-top: 2rem; width: 100%;">Display QR Code</button>
                </div>
            </div>
        </div>
        <div id="qrModal" class="qr-modal">
            <div class="qr-modal-content">
                <h2>QR Code for Customers</h2>
                <div id="qrCode" style="width: 300px; height: 300px; margin: 2rem auto; background: #f0f0f0; display: flex; align-items: center; justify-content: center;">
                    <p>QR Code will load here</p>
                </div>
                <p>Customers can scan this QR code to join your queue</p>
                <button onclick="closeQRModal()" class="btn btn-secondary">Close</button>
            </div>
        </div>
    </main>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="firebase-config.js"></script>
    <script>
        // Initialize dashboard
        const auth = firebase.auth();
        const db = firebase.firestore();
        
        let currentUserID = null;
        let currentProviderID = null;
        
        auth.onAuthStateChanged(async (user) => {
            if (!user) {
                window.location.href = 'login.html';
                return;
            }
            
            currentUserID = user.uid;
            document.getElementById('businessName').textContent = user.email;
            
            // Get provider data
            try {
                const providerDoc = await db.collection('providers').doc(user.uid).get();
                if (providerDoc.exists) {
                    currentProviderID = user.uid;
                    const data = providerDoc.data();
                    document.getElementById('businessName').textContent = data.businessName || user.email;
                    loadQueueData();
                } else {
                    // Auto-create provider record
                    await db.collection('providers').doc(user.uid).set({
                        businessName: 'My Business',
                        email: user.email,
                        createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                        isOpen: false,
                        queue: []
                    });
                    currentProviderID = user.uid;
                    loadQueueData();
                }
            } catch (error) {
                console.error('Error loading provider data:', error);
            }
        });
        
        function loadQueueData() {
            if (!currentProviderID) return;
            
            db.collection('providers').doc(currentProviderID).onSnapshot((doc) => {
                if (doc.exists) {
                    const data = doc.data();
                    const queue = data.queue || [];
                    
                    document.getElementById('queueCount').textContent = queue.length;
                    document.getElementById('queueStatus').textContent = data.isOpen ? 'Open' : 'Closed';
                    
                    const queueHTML = queue.length > 0 
                        ? queue.map((item, i) => `<div class="queue-item" style="padding: 1rem; border-bottom: 1px solid #e5e7eb;"><span>${i + 1}. ${item.name || 'Customer ' + (i + 1)}</span><span class="small">Wait: ${item.waitTime || 10} min</span></div>`).join('')
                        : '<div style="padding: 1rem; text-align: center; color: #999;">No customers in queue</div>';
                    
                    document.getElementById('queueItems').innerHTML = queueHTML;
                }
            });
        }
        
        function logout() {
            auth.signOut().then(() => {
                window.location.href = 'index.html';
            });
        }
        
        document.getElementById('displayQRBtn').addEventListener('click', () => {
            document.getElementById('qrModal').classList.add('active');
            // In production, generate a real QR code here
            const qrcodeUrl = `https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=${currentProviderID}`;
            document.getElementById('qrCode').innerHTML = `<img src="${qrcodeUrl}" alt="QR Code" style="width: 300px; height: 300px;">`;
        });
        
        function closeQRModal() {
            document.getElementById('qrModal').classList.remove('active');
        }
    </script>
</body>
</html>
