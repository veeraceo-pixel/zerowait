<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Business Dashboard | skipQs</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #2563eb; --primary-hover: #1d4ed8; --bg-light: #f8fafc; --border: #e2e8f0; --text-main: #1e293b; }
        body { font-family: 'Inter', sans-serif; background: var(--bg-light); color: var(--text-main); margin: 0; }
        header { background: white; border-bottom: 1px solid var(--border); padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; }
        .container { max-width: 1000px; margin: 2rem auto; padding: 0 1rem; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 1.5rem; margin-bottom: 2rem; }
        .card { background: white; padding: 2rem; border-radius: 1rem; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); text-align: center; border: 1px solid var(--border); }
        .stat-value { font-size: 3rem; font-weight: 800; color: var(--primary); margin: 0.5rem 0; }
        .btn { padding: 0.75rem 1.5rem; border-radius: 0.5rem; font-weight: 600; cursor: pointer; border: none; transition: 0.2s; font-size: 0.95rem; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-outline { background: white; border: 1px solid var(--border); color: #64748b; }
        .status-badge { display: inline-block; padding: 0.5rem 1.5rem; border-radius: 9999px; font-weight: 700; margin-bottom: 1rem; }
        .status-open { background: #dcfce7; color: #166534; }
        .status-closed { background: #fee2e2; color: #991b1b; }
        .qr-overlay { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.8); display: none; align-items: center; justify-content: center; z-index: 9999; }
        .qr-overlay.active { display: flex; }
        .qr-card { background: white; padding: 2rem; border-radius: 1rem; text-align: center; }
    </style>
</head>
<body>

    <header>
        <h2 id="businessName">Loading Business...</h2>
        <button id="logoutBtn" class="btn btn-outline">Logout</button>
    </header>

    <main class="container">
        <div class="stats-grid">
            <div class="card">
                <div class="stat-value" id="queueCount">0</div>
                <div style="color: #64748b;">People in Queue</div>
            </div>
            <div class="card">
                <div id="statusBadge" class="status-badge status-closed">Closed</div><br>
                <button id="switchBtn" class="btn btn-outline">Switch Status</button>
            </div>
        </div>

        <div class="card" style="text-align: left;">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <h3>Active Queue</h3>
                <button id="qrBtn" class="btn btn-primary">Show Check-in QR</button>
            </div>
            <div id="queueItems" style="margin-top: 1rem; text-align: center; color: #94a3b8;">
                No customers in line yet.
            </div>
        </div>
    </main>

    <div id="qrOverlay" class="qr-overlay">
        <div class="qr-card">
            <h3>Customer Check-in</h3>
            <div id="qrcode-box" style="margin: 1rem auto;"></div>
            <button onclick="document.getElementById('qrOverlay').classList.remove('active')" class="btn btn-outline">Close</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="firebase-config.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/easyqrcodejs@4.4.10/dist/easy.qrcode.min.js"></script>

    <script>
        // 1. LOGOUT (Assigned immediately)
        document.getElementById('logoutBtn').onclick = () => {
            firebase.auth().signOut().then(() => window.location.href = 'index.html');
        };

        // 2. QR CODE (Assigned immediately)
        document.getElementById('qrBtn').onclick = () => {
            const user = firebase.auth().currentUser;
            if (!user) return alert("Not logged in");
            
            const box = document.getElementById('qrcode-box');
            box.innerHTML = ""; // Clear old
            
            const joinUrl = `https://veeraceo-pixel.github.io/zerowait/join-queue.html?id=${user.uid}`;
            
            new QRCode(box, {
                text: joinUrl,
                width: 200,
                height: 200
            });
            document.getElementById('qrOverlay').classList.add('active');
        };

        // 3. DATA & STATUS
        firebase.auth().onAuthStateChanged(user => {
            if (!user) {
                window.location.href = 'login.html';
                return;
            }

            const docRef = firebase.firestore().collection('providers').doc(user.uid);

            // Listen for data
            docRef.onSnapshot(doc => {
                if (doc.exists) {
                    const data = doc.data();
                    document.getElementById('businessName').innerText = data.businessName || "My Business";
                    
                    const badge = document.getElementById('statusBadge');
                    badge.innerText = data.isOpen ? "Open" : "Closed";
                    badge.className = `status-badge ${data.isOpen ? 'status-open' : 'status-closed'}`;
                    
                    document.getElementById('queueCount').innerText = (data.queue || []).length;
                }
            });

            // Switch Status Button
            document.getElementById('switchBtn').onclick = async () => {
                const doc = await docRef.get();
                const current = doc.data().isOpen || false;
                await docRef.update({ isOpen: !current });
            };
        });
    </script>
</body>
</html>
